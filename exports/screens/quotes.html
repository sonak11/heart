<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HEART · Quote Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
* { box-sizing: border-box; }
html, body { margin: 0; background: var(--paper); }
::selection { background: var(--scarlet-100); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 999px; border: 2px solid var(--paper); }

/* ===== tokens/fonts.css ===== */
/* HEART webfonts.
   SUBSTITUTION FLAG: No brand font binaries were provided, so these are the
   closest Google Fonts matches. Swap the @import for self-hosted @font-face
   rules + woff2 files when the real faces are available.
   - Newsreader  -> editorial serif: headlines, big KPI numbers, report prose
   - Public Sans -> civic UI sans (USWDS face): all interface chrome, tables, labels
   - IBM Plex Mono -> data + code: codes, IDs, axis labels, AWS surfaces */



/* ===== tokens/colors.css ===== */
/* ============================================================
   HEART · COLOR TOKENS
   "Intelligence briefing" palette: warm-paper neutrals, Rutgers
   scarlet brand mark, deep ink for authority, and a disciplined
   data layer (engagement circles + categorical theme palette).
   ============================================================ */

:root {
  /* ---- Brand --------------------------------------------------- */
  --scarlet-700: #8E0021;   /* pressed / on-dark */
  --scarlet-600: #B3002D;
  --scarlet-500: #CC0033;   /* Rutgers scarlet — primary brand */
  --scarlet-400: #E03A5F;
  --scarlet-100: #FBE3E8;   /* tint wash */
  --scarlet-050: #FDF1F3;

  /* ---- Ink / warm neutrals (paper) ----------------------------- */
  --ink-900: #1A1714;   /* near-black, warm — display text on paper */
  --ink-800: #26221E;
  --ink-700: #3A352F;   /* body text */
  --ink-600: #56504A;
  --ink-500: #756E66;   /* secondary text */
  --ink-400: #9A938B;   /* muted / placeholder */
  --ink-300: #C4BDB4;   /* hairlines on tint */
  --ink-200: #E2DCD3;   /* borders */
  --ink-150: #ECE7DF;   /* subtle divider */
  --ink-100: #F4F0EA;   /* sunken surface */
  --paper:    #FBF9F5;  /* app background — warm paper */
  --white:    #FFFFFF;

  /* ---- Authority surface (deep, for exec/leadership chrome) ---- */
  --slate-900: #14171F;   /* darkest authority surface */
  --slate-800: #1C2230;
  --slate-700: #283142;
  --slate-600: #3A4459;
  --slate-200: #AEB6C6;
  --slate-100: #DDE2EC;

  /* ---- Engagement circles (the spine of HEART analytics) ------- */
  --circle-community: #C2541E;   /* Circle 1 · Community Voice — clay */
  --circle-community-soft: #F6E6DA;
  --circle-internal:  #1F7A6E;   /* Circle 2 · Internal Stakeholders — teal */
  --circle-internal-soft: #DCEFEC;
  --circle-leadership:#2C4A8C;   /* Circle 3 · Leadership — deep blue */
  --circle-leadership-soft: #DEE6F4;

  /* ---- Categorical theme palette (parent codes / pillars) ------ */
  --cat-1: #2C4A8C;   /* indigo   */
  --cat-2: #1F7A6E;   /* teal     */
  --cat-3: #C2541E;   /* clay     */
  --cat-4: #B38A1D;   /* ochre    */
  --cat-5: #7A4E8C;   /* plum     */
  --cat-6: #4C7A2C;   /* moss     */
  --cat-7: #A23B5E;   /* rose     */
  --cat-8: #487A9E;   /* steel    */

  /* ---- Semantic (status) -------------------------------------- */
  --positive-600: #1F6B45;
  --positive-500: #2E8B5A;
  --positive-100: #DDEEE3;
  --caution-600:  #9A6A00;
  --caution-500:  #C28A1A;
  --caution-100:  #F6EBD2;
  --critical-600: #A01029;
  --critical-500: #C61F3D;   /* alerts — kept distinct from scarlet brand */
  --critical-100: #F8DEE2;
  --info-600:     #1E5F94;
  --info-500:     #2C7BBD;
  --info-100:     #DCEAF5;

  /* ---- Heat scale (gap / intensity ramps) --------------------- */
  --heat-0: #F4F0EA;
  --heat-1: #F8DCC6;
  --heat-2: #F0B894;
  --heat-3: #E08A5A;
  --heat-4: #C2541E;
  --heat-5: #8E3410;

  /* ============================================================
     SEMANTIC ALIASES — author UI against these, not raw values.
     ============================================================ */
  --bg-app:        var(--paper);
  --bg-authority:  var(--slate-900);   /* exec banners, leadership chrome */
  --surface-card:  var(--white);
  --surface-sunken:var(--ink-100);
  --surface-tint:  var(--scarlet-050);

  --text-display:  var(--ink-900);
  --text-body:     var(--ink-700);
  --text-secondary:var(--ink-500);
  --text-muted:    var(--ink-400);
  --text-on-brand: var(--white);
  --text-on-authority: var(--slate-100);
  --text-link:     var(--scarlet-600);

  --border-default:var(--ink-200);
  --border-strong: var(--ink-300);
  --border-divider:var(--ink-150);

  --brand:         var(--scarlet-500);
  --brand-hover:   var(--scarlet-600);
  --brand-press:   var(--scarlet-700);
  --focus-ring:    var(--scarlet-400);

  --bg-topbar:     rgba(251, 249, 245, 0.82);  /* translucent paper for sticky chrome */
}

/* ============================================================
   DARK MODE — remaps the warm-neutral base ramp so every
   token-driven surface inverts automatically. Brand + circle
   hues are nudged brighter for contrast on dark.
   ============================================================ */
[data-theme="dark"] {
  --ink-900: #F5F1EA;   /* display text → warm near-white */
  --ink-800: #E7E2D9;
  --ink-700: #D6D0C5;   /* body */
  --ink-600: #B4ADA1;
  --ink-500: #948D81;   /* secondary */
  --ink-400: #7C7468;   /* muted */
  --ink-300: #574F45;   /* hairline on tint */
  --ink-200: #3A352D;   /* border */
  --ink-150: #2E2A23;   /* divider */
  --ink-100: #24211B;   /* sunken */
  --paper:   #16140F;   /* app background — deep warm */
  --white:   #201D16;   /* lifted card surface */

  --scarlet-050: #2A1A1C;   /* active-nav / insight wash on dark */
  --scarlet-100: #3A1F25;
  --scarlet-500: #E8466A;   /* brand brightened for dark contrast */
  --scarlet-400: #F0698A;

  --circle-community: #E07A3E;
  --circle-community-soft: #2E2118;
  --circle-internal:  #3FA89A;
  --circle-internal-soft: #16241F;
  --circle-leadership:#5B82C8;
  --circle-leadership-soft: #161E2E;

  --cat-1: #5B82C8; --cat-2: #3FA89A; --cat-3: #E07A3E; --cat-4: #D4AC3A;
  --cat-5: #A878BE; --cat-6: #79AE4E; --cat-7: #CC6488; --cat-8: #6FA3C4;

  --heat-0: #24211B; --heat-1: #3A2A1E; --heat-2: #6B3F1E;
  --heat-3: #9A551F; --heat-4: #C2541E; --heat-5: #E8884A;

  --positive-600: #5FC78C; --positive-500: #3FA86E; --positive-100: #15291D;
  --caution-600:  #E0B24A; --caution-500:  #C99A2A; --caution-100:  #2C2412;
  --critical-600: #F0697F; --critical-500: #D63A55; --critical-100: #2E141A;
  --info-600:     #6BB0E8; --info-500:     #3F8FCC; --info-100:     #11212E;

  --bg-authority:  #0E1016;
  --slate-900: #0E1016; --slate-800: #181D28; --slate-700: #232B3A;

  --bg-topbar:     rgba(22, 20, 15, 0.82);

  --shadow-xs: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 14px rgba(0,0,0,0.5);
  --shadow-lg: 0 12px 36px rgba(0,0,0,0.6);
}

/* ===== tokens/typography.css ===== */
/* ============================================================
   HEART · TYPOGRAPHY TOKENS
   Newsreader (editorial serif) — headlines + big KPI numbers.
   Public Sans (civic UI sans) — all interface chrome.
   IBM Plex Mono — codes, IDs, axis + metadata labels.
   ============================================================ */

:root {
  /* ---- Families ----------------------------------------------- */
  --font-serif: 'Newsreader', 'Iowan Old Style', Georgia, serif;
  --font-sans:  'Public Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono:  'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;

  /* ---- Weights ------------------------------------------------ */
  --w-regular: 400;  /* @kind font */
  --w-medium:  500;  /* @kind font */
  --w-semibold:600;  /* @kind font */
  --w-bold:    700;  /* @kind font */

  /* ---- Type scale (px / line-height) -------------------------- */
  --fs-display:   44px;  --lh-display:   1.05;  /* @kind other */
  --fs-h1:        32px;  --lh-h1:        1.12;  /* @kind other */
  --fs-h2:        24px;  --lh-h2:        1.18;  /* @kind other */
  --fs-h3:        19px;  --lh-h3:        1.25;  /* @kind other */
  --fs-title:     16px;  --lh-title:     1.35;  /* @kind other */
  --fs-body:      15px;  --lh-body:      1.55;  /* @kind other */
  --fs-sm:        13px;  --lh-sm:        1.45;  /* @kind other */
  --fs-xs:        12px;  --lh-xs:        1.4;   /* @kind other */
  --fs-kpi:       40px;  --lh-kpi:       1.0;   /* @kind other */
  --fs-kpi-lg:    56px;  --lh-kpi-lg:    0.98;  /* @kind other */

  /* ---- Tracking ----------------------------------------------- */
  --tracking-tight:  -0.02em;  /* @kind other */
  --tracking-normal: 0;        /* @kind other */
  --tracking-label:  0.06em;   /* @kind other */
  --tracking-wide:   0.12em;   /* @kind other */

  /* ============================================================
     SEMANTIC TYPE ROLES
     ============================================================ */
  --type-display: var(--w-semibold) var(--fs-display)/var(--lh-display) var(--font-serif);
  --type-h1:      var(--w-semibold) var(--fs-h1)/var(--lh-h1) var(--font-serif);
  --type-h2:      var(--w-semibold) var(--fs-h2)/var(--lh-h2) var(--font-sans);
  --type-h3:      var(--w-semibold) var(--fs-h3)/var(--lh-h3) var(--font-sans);
  --type-title:   var(--w-semibold) var(--fs-title)/var(--lh-title) var(--font-sans);
  --type-body:    var(--w-regular) var(--fs-body)/var(--lh-body) var(--font-sans);
  --type-sm:      var(--w-regular) var(--fs-sm)/var(--lh-sm) var(--font-sans);
  --type-kpi:     var(--w-semibold) var(--fs-kpi)/var(--lh-kpi) var(--font-serif);

  /* Mono eyebrow/overline — set with --tracking-label + uppercase */
  --type-eyebrow: var(--w-medium) var(--fs-xs)/1.2 var(--font-mono);
  --type-meta:    var(--w-regular) var(--fs-xs)/1.4 var(--font-mono);
}

/* ===== tokens/spacing.css ===== */
/* ============================================================
   HEART · SPACING, RADII, LAYOUT
   4px base grid.
   ============================================================ */

:root {
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;

  /* Radii — restrained; analytics surfaces read crisp, not bubbly */
  --radius-xs: 3px;
  --radius-sm: 5px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 999px;

  /* Layout */
  --sidebar-w: 248px;
  --topbar-h:  60px;
  --content-max: 1320px;
  --gutter: var(--space-6);
}

/* ===== tokens/elevation.css ===== */
/* ============================================================
   HEART · ELEVATION & BORDERS
   Soft, warm-tinted shadows. Cards read as paper on paper —
   defined by a hairline border first, shadow second.
   ============================================================ */

:root {
  --shadow-xs: 0 1px 2px rgba(26, 23, 20, 0.05);
  --shadow-sm: 0 1px 3px rgba(26, 23, 20, 0.07), 0 1px 2px rgba(26, 23, 20, 0.04);
  --shadow-md: 0 4px 12px rgba(26, 23, 20, 0.08), 0 1px 3px rgba(26, 23, 20, 0.05);
  --shadow-lg: 0 12px 32px rgba(26, 23, 20, 0.12), 0 2px 8px rgba(26, 23, 20, 0.06);
  --shadow-pop: 0 16px 48px rgba(20, 23, 31, 0.22);  /* over authority surface */

  --border-hair: 1px solid var(--border-default);
  --border-card: 1px solid var(--border-divider);

  --ring-focus: 0 0 0 3px var(--scarlet-100), 0 0 0 1px var(--scarlet-500);

  /* Motion */
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);     /* @kind other */
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);  /* @kind other */
  --dur-fast: 120ms;  /* @kind other */
  --dur-base: 200ms;  /* @kind other */
  --dur-slow: 320ms;  /* @kind other */
}


/* ===================== mobile / responsive ===================== */
@media (max-width: 860px) {
  :root { --content-max: 100%; }
  /* collapse any multi-column grid to a single readable column */
  #root [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
  /* let wide space-between rows stack instead of overflowing */
  #root main [style*="display: flex"][style*="space-between"] { flex-wrap: wrap; }
  /* tighten the sticky filter bar gutters (matches its inline signature) */
  #root [style*="var(--topbar-h)"][style*="flex-wrap"] { padding-left: 14px !important; padding-right: 14px !important; }
  /* shrink oversized hero KPI numbers so they fit */
  #root [style*="font-size: 64px"] { font-size: 46px !important; }
  /* keep responsive charts inside their cards */
  #root main svg[width="100%"] { max-width: 100%; }
  /* copilot becomes a full-width sheet */
  .heart-copilot-drawer { width: 100% !important; max-width: 420px; }
}
@media (max-width: 540px) {
  #root [style*="font-size: 64px"] { font-size: 38px !important; }
  .heart-copilot-drawer { max-width: none; }
}

      { id: 'dir', label: 'Directly Affected',   color: 'var(--circle-community)', n: 96, trust: 0.38 },
      { id: 'ind', label: 'Indirectly Affected', color: 'var(--circle-leadership)', n: 115, trust: 0.64 },
    ],
  };

  // Coding Matrix Explorer rows — interview → codes → subcodes → quote
  const matrixRows = [
    { interview: 'INT-2026-0142', circle: 1, role: 'Community member', authority: 'lo', proximity: 'dir', domain: 'D5', subs: ['Structural Barriers','Resource Limitations'], onehot: { D5:1, D8:1, D7:1, D1:0, D11:0 }, quote: 'INT-2026-0142' },
    { interview: 'INT-2026-0119', circle: 3, role: 'Dean', authority: 'hi', proximity: 'ind', domain: 'D2', subs: ['Formal Initiatives','Practice Strategies'], onehot: { D2:1, D1:1, D4:1, D5:0, D8:0 }, quote: 'INT-2026-0119' },
    { interview: 'INT-2026-0131', circle: 2, role: 'Program coordinator', authority: 'med', proximity: 'dir', domain: 'D8', subs: ['Trust','Credibility'], onehot: { D8:1, D9:1, D3:1, D5:0, D4:0 }, quote: 'INT-2026-0131' },
    { interview: 'INT-2026-0156', circle: 1, role: 'Patient advocate', authority: 'lo', proximity: 'dir', domain: 'D5', subs: ['Structural Barriers'], onehot: { D5:1, D8:1, D9:0, D11:0, D1:0 }, quote: 'INT-2026-0156' },
    { interview: 'INT-2026-0162', circle: 3, role: 'Department chair', authority: 'hi', proximity: 'ind', domain: 'D4', subs: ['Measurement Gaps','Data Sources'], onehot: { D4:1, D2:1, D11:1, D8:0, D5:0 }, quote: 'INT-2026-0162' },
    { interview: 'INT-2026-0174', circle: 1, role: 'Community member', authority: 'lo', proximity: 'dir', domain: 'D8', subs: ['Trust','Responsiveness'], onehot: { D8:1, D3:1, D5:1, D2:0, D4:0 }, quote: 'INT-2026-0174' },
  ];

  function pillarName(id) { const p = pillars.find((x) => x.id === id); return p ? p.name : id; }
  function themeByCode(code) { return themes.find((t) => t.code === code); }

  // ============================================================
  // REACTIVE LAYER — derive a filtered/scaled dataset from the
  // global filters {circle, domain, time}. Every dashboard reads
  // from this so the FilterBar genuinely changes what is shown.
  // ============================================================
  const timeMeta = {
    q2:  { label: 'Q2 2026',      scale: 1.00, trendEnd: 6, priorLabel: 'vs Q1' },
    q1:  { label: 'Q1 2026',      scale: 0.78, trendEnd: 5, priorLabel: 'vs Q4' },
    ytd: { label: 'Year to date', scale: 1.34, trendEnd: 6, priorLabel: 'vs 2025' },
    all: { label: 'All time',     scale: 1.62, trendEnd: 6, priorLabel: 'vs start' },
  };
  const circleShare = { 1: 0.49, 2: 0.31, 3: 0.20 };

  function valByCircle(d, circle) {
    if (circle === 1) return d.c1; if (circle === 2) return d.c2; if (circle === 3) return d.c3;
    return Math.round((d.c1 + d.c2 + d.c3) / 3);
  }

  function derive(filters) {
    const f = filters || {};
    const circle = f.circle == null ? 'all' : f.circle;
    const domain = f.domain || 'all';
    const tm = timeMeta[f.time] || timeMeta.q2;

    // corpus counts scale with timeframe, narrow with circle
    let interviews = Math.round(247 * tm.scale);
    let participants = Math.round(211 * tm.scale);
    let segments = Math.round(5840 * tm.scale);
    if (circle !== 'all') {
      interviews = Math.round(interviews * circleShare[circle]);
      participants = Math.round(participants * circleShare[circle]);
      segments = Math.round(segments * circleShare[circle]);
    }

    // domain stats — optionally narrowed to one domain
    let ds = domain === 'all' ? domainStats : domainStats.filter((d) => d.id === domain);

    // themes narrowed by circle relevance + domain (via parent mapping is loose; keep all unless domain set)
    let th = themes.slice();
    if (circle === 1) th = th.filter((t) => t.community >= t.leadership);
    else if (circle === 3) th = th.filter((t) => t.leadership >= t.community);

    // quotes narrowed by circle
    let qs = quotes.slice();
    if (circle !== 'all') qs = qs.filter((q) => q.circle === circle);

    // readiness shifts with timeframe + circle lens
    let composite = readiness.composite;
    if (f.time === 'q1') composite -= 5; else if (f.time === 'all') composite += 3;
    if (circle === 1) composite -= 9; else if (circle === 3) composite += 6;
    composite = Math.max(0, Math.min(100, composite));

    // human-readable summary of the active lens
    const parts = [];
    parts.push(circle === 'all' ? 'All circles' : circles[circle].label);
    if (domain !== 'all') parts.push(domainById(domain).name);
    parts.push(tm.label);

    return {
      circle, domain, time: f.time || 'q2', tm,
      interviews, participants, segments, composite,
      domainStats: ds, themes: th, quotes: qs,
      isFiltered: circle !== 'all' || domain !== 'all' || (f.time && f.time !== 'q2'),
      summary: parts.join(' · '),
      valByCircle: (d) => valByCircle(d, circle),
    };
  }

  const readiness = {
    composite: 67, prior: 62,
    drivers: [
      { label: 'Coverage breadth', value: 82, weight: 0.2 },
      { label: 'Coding agreement', value: 91, weight: 0.15 },
      { label: 'Community alignment', value: 49, weight: 0.3 },
      { label: 'Action follow-through', value: 58, weight: 0.2 },
      { label: 'Data infrastructure', value: 64, weight: 0.15 },
    ],
    history: [54, 57, 59, 61, 62, 67],
  };

  const coding = {
    agreement: 91, totalSegments: 5840, aiCoded: 5840, humanReviewed: 2106,
    confusion: [ // parent x parent agreement matrix (diag = self-agreement)
      [96, 4, 2, 1], [5, 92, 6, 2], [3, 7, 89, 4], [2, 3, 5, 94],
    ],
    parents: ['Barriers','Facilitators','Workforce','Research'],
    aiVsHuman: [
      { code: 'BARR-04', ai: 138, human: 134 },
      { code: 'FAC-02', ai: 102, human: 109 },
      { code: 'WORK-11', ai: 121, human: 118 },
      { code: 'RES-01', ai: 90, human: 86 },
      { code: 'EDU-12', ai: 70, human: 77 },
    ],
  };

  window.HEART_DATA = { circles, cat, pillars, themes, stakeholders, programs, geo, months, recommendations, quotes, readiness, coding, pillarName, themeByCode,
    domains, domainStats, domainById, domainStat, authority, proximity, matrixRows, derive, timeMeta,
    domainCooc, coocOf, coocPairs };
})();

</script>

<script type="text/babel" data-module="Charts">
/* Reusable tokenized SVG chart primitives. window.Charts */
(function () {
  const INK = 'var(--ink-400)';
  const GRID = 'var(--border-divider)';
  const mono = { fontFamily: 'var(--font-mono)', fontSize: 10 };

  function heat(v) { // 0..100 -> heat token
    const i = Math.min(5, Math.max(0, Math.round((v / 100) * 5)));
    return ['var(--heat-0)','var(--heat-1)','var(--heat-2)','var(--heat-3)','var(--heat-4)','var(--heat-5)'][i];
  }

  // --- Sparkline -----------------------------------------------------------
  function Sparkline({ values, color = 'var(--circle-internal)', w = 80, h = 24, fill = true }) {
    const max = Math.max(...values), min = Math.min(...values);
    const rng = max - min || 1;
    const pts = values.map((v, i) => [(i / (values.length - 1)) * w, h - ((v - min) / rng) * (h - 4) - 2]);
    const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
    return (
      <svg width={w} height={h} style={{ display: 'block', overflow: 'visible' }}>
        {fill && <path d={`${d} L${w},${h} L0,${h} Z`} fill={color} opacity="0.1" />}
        <path d={d} fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" />
        <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2.5" fill={color} />
      </svg>
    );
  }

  // --- Multi-line trend chart with optional scrubber -----------------------
  function TrendChart({ series, labels, w = 640, h = 220, scrub = null, onScrub }) {
    const pad = { l: 34, r: 12, t: 14, b: 24 };
    const iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
    const all = series.flatMap((s) => s.values);
    const max = Math.max(...all) * 1.1, min = 0;
    const x = (i) => pad.l + (i / (labels.length - 1)) * iw;
    const y = (v) => pad.t + ih - ((v - min) / (max - min)) * ih;
    const ticks = [0, 0.25, 0.5, 0.75, 1].map((f) => Math.round(max * f));
    return (
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: 'block' }} onMouseMove={(e) => {
        if (!onScrub) return;
        const r = e.currentTarget.getBoundingClientRect();
        const px = ((e.clientX - r.left) / r.width) * w;
        const idx = Math.round(((px - pad.l) / iw) * (labels.length - 1));
        onScrub(Math.max(0, Math.min(labels.length - 1, idx)));
      }}>
        {ticks.map((t, i) => (
          <g key={i}>
            <line x1={pad.l} x2={w - pad.r} y1={y(t)} y2={y(t)} stroke={GRID} />
            <text x={pad.l - 6} y={y(t) + 3} textAnchor="end" style={mono} fill={INK}>{t}</text>
          </g>
        ))}
        {labels.map((l, i) => <text key={l} x={x(i)} y={h - 6} textAnchor="middle" style={mono} fill={INK}>{l}</text>)}
        {scrub != null && <line x1={x(scrub)} x2={x(scrub)} y1={pad.t} y2={pad.t + ih} stroke="var(--ink-300)" strokeDasharray="3 3" />}
        {series.map((s) => {
          const d = s.values.map((v, i) => (i ? 'L' : 'M') + x(i).toFixed(1) + ',' + y(v).toFixed(1)).join(' ');
          return <g key={s.label}>
            <path d={d} fill="none" stroke={s.color} strokeWidth="2.25" strokeLinecap="round" strokeLinejoin="round" />
            {scrub != null && <circle cx={x(scrub)} cy={y(s.values[scrub])} r="3.5" fill={s.color} stroke="#fff" strokeWidth="1.5" />}
          </g>;
        })}
      </svg>
    );
  }

  // --- Horizontal bars -----------------------------------------------------
  function HBars({ items, max, color, w = 100 }) { // items: {label, value, color?}
    const mx = max || Math.max(...items.map((i) => i.value));
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {items.map((it) => (
          <div key={it.label} style={{ display: 'grid', gridTemplateColumns: '150px 1fr 40px', alignItems: 'center', gap: 10 }}>
            <span style={{ font: 'var(--type-sm)', color: 'var(--ink-700)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{it.label}</span>
            <div style={{ height: 14, background: 'var(--ink-100)', borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ width: (it.value / mx) * 100 + '%', height: '100%', background: it.color || color || 'var(--circle-internal)', borderRadius: 3 }} />
            </div>
            <span style={{ fontFamily: 'var(--font-serif)', fontSize: 14, fontWeight: 600, color: 'var(--ink-800)', textAlign: 'right' }}>{it.value}</span>
          </div>
        ))}
      </div>
    );
  }

  // --- Heatmap matrix ------------------------------------------------------
  function Heatmap({ rows, cols, matrix, onCell, fmt = (v) => v, colorFn = heat }) {
    return (
      <div style={{ display: 'grid', gridTemplateColumns: `120px repeat(${cols.length}, 1fr)`, gap: 4, alignItems: 'center' }}>
        <div />
        {cols.map((c) => <div key={c} style={{ ...mono, color: INK, textAlign: 'center', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{c}</div>)}
        {rows.map((r, ri) => (
          <React.Fragment key={r}>
            <div style={{ font: 'var(--type-sm)', color: 'var(--ink-700)', textAlign: 'right', paddingRight: 8 }}>{r}</div>
            {cols.map((c, ci) => {
              const v = matrix[ri][ci];
              const dark = v > 55;
              return <button key={c} type="button" onClick={() => onCell && onCell(ri, ci, v)} style={{ aspectRatio: '1.6', border: 'none', borderRadius: 4, cursor: onCell ? 'pointer' : 'default', background: colorFn(v), color: dark ? '#fff' : 'var(--ink-700)', fontFamily: 'var(--font-serif)', fontSize: 13, fontWeight: 600 }}>{fmt(v)}</button>;
            })}
          </React.Fragment>
        ))}
      </div>
    );
  }

  // --- Gauge (semicircle) --------------------------------------------------
  function Gauge({ value, max = 100, size = 200, color = 'var(--circle-internal)', label }) {
    const r = size / 2 - 16, cx = size / 2, cy = size / 2;
    const a = Math.PI * (1 - value / max);
    const x2 = cx + r * Math.cos(a), y2 = cy - r * Math.sin(a);
    const arc = (frac) => { const ang = Math.PI * (1 - frac); return [cx + r * Math.cos(ang), cy - r * Math.sin(ang)]; };
    const [sx, sy] = arc(0);
    return (
      <svg width={size} height={size / 1.7} viewBox={`0 0 ${size} ${size / 1.7}`}>
        <path d={`M${sx},${sy} A${r},${r} 0 0 1 ${cx + r},${cy}`} fill="none" stroke="var(--ink-150)" strokeWidth="14" strokeLinecap="round" />
        <path d={`M${sx},${sy} A${r},${r} 0 ${value/max > 0.5 ? 1 : 0} 1 ${x2},${y2}`} fill="none" stroke={color} strokeWidth="14" strokeLinecap="round" />
        <text x={cx} y={cy - 4} textAnchor="middle" style={{ fontFamily: 'var(--font-serif)', fontSize: 40, fontWeight: 600, fill: 'var(--ink-900)' }}>{value}</text>
        {label && <text x={cx} y={cy + 16} textAnchor="middle" style={{ ...mono, fill: INK, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{label}</text>}
      </svg>
    );
  }

  // --- Scatter (impact vs effort) -----------------------------------------
  function Scatter({ points, w = 380, h = 300, xLabel = 'Effort', yLabel = 'Impact', onPoint }) {
    const pad = 36;
    const x = (v) => pad + ((v - 1) / 4) * (w - pad * 1.5);
    const y = (v) => h - pad - ((v - 1) / 4) * (h - pad * 1.5);
    return (
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: 'block' }}>
        <line x1={pad} y1={pad/2} x2={pad} y2={h - pad} stroke={GRID} />
        <line x1={pad} y1={h - pad} x2={w - pad/2} y2={h - pad} stroke={GRID} />
        <text x={w/2} y={h - 6} textAnchor="middle" style={mono} fill={INK}>{xLabel} →</text>
        <text x={12} y={h/2} textAnchor="middle" transform={`rotate(-90 12 ${h/2})`} style={mono} fill={INK}>{yLabel} →</text>
        <text x={pad + 6} y={pad/2 + 4} style={{ ...mono }} fill="var(--positive-600)">quick wins</text>
        {points.map((p) => (
          <g key={p.id} style={{ cursor: onPoint ? 'pointer' : 'default' }} onClick={() => onPoint && onPoint(p)}>
            <circle cx={x(p.effort)} cy={y(p.impact)} r={6 + p.confidence * 6} fill={p.color || 'var(--circle-community)'} opacity="0.85" />
            <text x={x(p.effort)} y={y(p.impact) - 12 - p.confidence * 6} textAnchor="middle" style={{ ...mono, fontWeight: 600 }} fill="var(--ink-700)">{p.id}</text>
          </g>
        ))}
      </svg>
    );
  }

  // --- Network (static radial layout) -------------------------------------
  function Network({ nodes, links, w = 560, h = 360, onNode }) {
    const cx = w / 2, cy = h / 2;
    const pos = {};
    const center = nodes.filter((n) => n.center);
    const ring = nodes.filter((n) => !n.center);
    center.forEach((n) => { pos[n.id] = [cx, cy]; });
    ring.forEach((n, i) => {
      const a = (i / ring.length) * Math.PI * 2 - Math.PI / 2;
      pos[n.id] = [cx + Math.cos(a) * (w * 0.36), cy + Math.sin(a) * (h * 0.38)];
    });
    return (
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: 'block' }}>
        {links.map((l, i) => { const a = pos[l.s], b = pos[l.t]; return <line key={i} x1={a[0]} y1={a[1]} x2={b[0]} y2={b[1]} stroke="var(--ink-300)" strokeWidth={1 + l.w * 3} opacity="0.5" />; })}
        {nodes.map((n) => { const p = pos[n.id]; const rr = n.center ? 30 : 8 + (n.size || 1) * 5; return (
          <g key={n.id} style={{ cursor: onNode ? 'pointer' : 'default' }} onClick={() => onNode && onNode(n)}>
            <circle cx={p[0]} cy={p[1]} r={rr} fill={n.color} opacity={n.center ? 1 : 0.9} />
            <text x={p[0]} y={n.center ? p[1] + 4 : p[1] + rr + 13} textAnchor="middle" style={{ fontFamily: n.center ? 'var(--font-sans)' : 'var(--font-mono)', fontSize: n.center ? 13 : 10, fontWeight: 600, fill: n.center ? '#fff' : 'var(--ink-600)' }}>{n.label}</text>
          </g>
        ); })}
      </svg>
    );
  }

  // --- NJ region tile map --------------------------------------------------
  function RegionMap({ regions, onRegion, active }) {
    const cols = 4, cell = 92, gap = 8;
    return (
      <svg width="100%" viewBox={`0 0 ${cols * (cell + gap)} ${6 * (cell * 0.7 + gap)}`} style={{ display: 'block' }}>
        {regions.map((r) => {
          const x = r.x * (cell + gap), y = r.y * (cell * 0.7 + gap);
          const on = active === r.id;
          return (
            <g key={r.id} style={{ cursor: 'pointer' }} onClick={() => onRegion && onRegion(r)}>
              <rect x={x} y={y} width={cell} height={cell * 0.7} rx="6" fill={heat(r.value)} stroke={on ? 'var(--ink-900)' : '#fff'} strokeWidth={on ? 2.5 : 1.5} />
              <text x={x + 8} y={y + 18} style={{ fontFamily: 'var(--font-sans)', fontSize: 9.5, fontWeight: 600, fill: r.value > 55 ? '#fff' : 'var(--ink-800)' }}>{r.name.split(' / ')[0]}</text>
              <text x={x + 8} y={y + cell * 0.7 - 8} style={{ fontFamily: 'var(--font-serif)', fontSize: 18, fontWeight: 600, fill: r.value > 55 ? '#fff' : 'var(--ink-800)' }}>{r.value}</text>
            </g>
          );
        })}
      </svg>
    );
  }

  // --- Radar / spider chart ------------------------------------------------
  function Radar({ axes, series, size = 320, max = 50 }) {
    // axes: [{label}], series: [{label,color,values:[...]}]
    const cx = size / 2, cy = size / 2, r = size / 2 - 46;
    const n = axes.length;
    const pt = (i, frac) => {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      return [cx + Math.cos(a) * r * frac, cy + Math.sin(a) * r * frac];
    };
    const rings = [0.25, 0.5, 0.75, 1];
    return (
      <svg width="100%" viewBox={`0 0 ${size} ${size}`} style={{ display: 'block', overflow: 'visible' }}>
        {rings.map((f, ri) => (
          <polygon key={ri} points={axes.map((_, i) => pt(i, f).join(',')).join(' ')} fill="none" stroke={GRID} strokeWidth="1" />
        ))}
        {axes.map((ax, i) => {
          const [x, y] = pt(i, 1);
          const [lx, ly] = pt(i, 1.18);
          return (
            <g key={i}>
              <line x1={cx} y1={cy} x2={x} y2={y} stroke={GRID} strokeWidth="1" />
              <text x={lx} y={ly + 3} textAnchor={Math.abs(lx - cx) < 8 ? 'middle' : lx > cx ? 'start' : 'end'} style={{ ...mono, fontSize: 9.5 }} fill={INK}>{ax.label}</text>
            </g>
          );
        })}
        {series.map((s) => {
          const poly = s.values.map((v, i) => pt(i, Math.min(1, v / max)).join(',')).join(' ');
          return (
            <g key={s.label}>
              <polygon points={poly} fill={s.color} fillOpacity="0.14" stroke={s.color} strokeWidth="2" strokeLinejoin="round" />
              {s.values.map((v, i) => { const [x, y] = pt(i, Math.min(1, v / max)); return <circle key={i} cx={x} cy={y} r="3" fill={s.color} />; })}
            </g>
          );
        })}
      </svg>
    );
  }

  // --- Stacked horizontal bar (100% composition) ---------------------------
  function StackedBars({ items, segs }) {
    // items: [{label, parts:{key:value}}]; segs: [{key,label,color}]
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {items.map((it) => {
          const total = segs.reduce((s, g) => s + (it.parts[g.key] || 0), 0) || 1;
          return (
            <div key={it.label} style={{ display: 'grid', gridTemplateColumns: '150px 1fr', alignItems: 'center', gap: 12 }}>
              <span style={{ font: 'var(--type-sm)', color: 'var(--ink-700)' }}>{it.label}</span>
              <div style={{ display: 'flex', height: 18, borderRadius: 4, overflow: 'hidden', background: 'var(--ink-100)' }}>
                {segs.map((g) => {
                  const w = ((it.parts[g.key] || 0) / total) * 100;
                  return w > 0 ? <div key={g.key} title={`${g.label}: ${it.parts[g.key]}%`} style={{ width: w + '%', background: g.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    {w > 12 && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, color: '#fff', fontWeight: 600 }}>{it.parts[g.key]}</span>}
                  </div> : null;
                })}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  window.Charts = { Sparkline, TrendChart, HBars, Heatmap, Gauge, Scatter, Network, RegionMap, Radar, StackedBars, heat };
})();

</script>

<script type="text/babel" data-module="FilterBar">

  }
  window.pushToast = pushToast;

  function Toasts() {
    const [items, setItems] = React.useState([]);

        setItems((x) => [...x, e.detail]);
        setTimeout(() => setItems((x) => x.filter((i) => i.id !== e.detail.id)), 3200);
      };
      window.addEventListener('heart-toast', h);
      return () => window.removeEventListener('heart-toast', h);
    }, []);
    const color = { neutral: 'var(--slate-800)', positive: 'var(--positive-600)', critical: 'var(--critical-600)' };

        <button type="button" onClick={onSnapshot} title="Snapshot" style={{ width: 34, height: 34, border: '1px solid var(--border-default)', background: 'var(--white)', color: 'var(--ink-500)', borderRadius: 'var(--radius-sm)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><window.Icon.file size={16} /></button>
      </div>
    );
  }

  function Sel({ label, value, onChange, options }) {
    return (
      <span style={{ position: 'relative', display: 'inline-flex', alignItems: 'center' }}>
        <select value={value} onChange={(e) => onChange(e.target.value)} style={{ appearance: 'none', WebkitAppearance: 'none', font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-700)', background: 'var(--white)', border: '1px solid var(--border-default)', borderRadius: 'var(--radius-sm)', padding: '7px 28px 7px 12px', cursor: 'pointer' }}>

                  <span style={{ flex: 1, font: 'var(--type-body)', fontWeight: 500, color: 'var(--ink-800)' }}>{it.label}</span>
                  {it.sub && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-400)' }}>{it.sub}</span>}
                  <span style={{ font: 'var(--type-eyebrow)', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-300)' }}>{it.type}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }
  window.CommandPalette = CommandPalette;
})();

</script>

<script type="text/babel" data-module="Copilot">

  };

  const ANSWERS = {
    'Summarize this quarter for the Dean': "Composite readiness rose to **67 (+5)**. Workforce and Community Partnerships improved; **Research Infrastructure slipped 5 pts**. The dominant signal is a widening **Voice–Authority gap**: community members raise transportation, language, and childcare barriers far more often than leadership acknowledges them. Recommended first move: a transportation-access task force (R1, 91% confidence, 138 segments).",
    'What are the top 3 risks?': "1. **Transportation access** — 41% of community interviews, 6% of leadership (gap +35). 2. **Language & interpretation** — emerging, +28 in two quarters. 3. **Research infrastructure regression** — pillar down 5 pts amid data-governance friction.",
    'Explain the biggest blind spot': "**Transportation access (BARR-04)** is the largest blind spot. It appears in **41%** of Community Voice segments but only **6%** of Leadership segments — a +35 divergence, the highest in the corpus. 138 coded segments and 12 high-salience quotes support it. This is a high-confidence, low-effort intervention target.",
    'Draft a narrative for leadership': "Across 247 interviews, the community is consistent: **the barriers to equity are logistical before they are clinical.** Transportation, interpretation, and childcare dominate community voice yet rarely surface in leadership interviews. Closing this perception gap — not new programs — is the fastest path to readiness gains this quarter.",
  };

  // Human-readable label for each route, used to ground the live Copilot.
  const SCREEN_LABEL = {
    overview: 'Executive Command Center', readiness: 'Health Equity Readiness Score',
    circle: 'Engagement & Stakeholders', theme: 'Theme Intelligence', emerging: 'Emerging Themes',
    voice: 'Voice vs Authority', blindspot: 'Blind Spot Detection', authority: 'Authority Analysis',
    proximity: 'Proximity Analysis', gap: 'Gaps & Barriers', barrier: 'Barrier Intelligence',
    trust: 'Trust & Community', stakeholder: 'Stakeholder Intelligence', quotes: 'Quote Explorer',
    matrix: 'Coding Matrix Explorer', network: 'Theme Connection Network', trend: 'Trends & Timeline',
    geo: 'Geographic Distribution', coding: 'Coding Quality', patterns: 'Connections, Trends & Geography',
    program: 'Program Impact', recommend: 'Programs & Blueprint', operations: 'Pipeline Operations',
    admin: 'AI Coding Agent Workspace', workflow: 'Workflow Monitoring', reports: 'Report Generation Center', aws: 'Future AWS Voice Agent Architecture',
  };

  // Ground every free-form question in HEART's domain + the screen the user is on,
  // so the Copilot answers real prompts (incl. "hello") instead of a canned blurb.
  function buildPrompt(q, screen) {
    const where = SCREEN_LABEL[screen] || 'the analytics platform';
    return [
      "You are HEART Copilot, the AI assistant embedded in HEART \u2014 a health-equity analytics platform for an academic medical center.",
      "HEART analyzes 247 qualitative community interviews, coded into themes, barriers, and three engagement circles (Community, Internal, Leadership).",
      "Context for this quarter (Q2 2026): composite readiness is 67/100, up 5 points from Q1. The dominant signal is a Voice\u2013Authority gap \u2014 community members raise logistical barriers (transportation, language/interpretation, childcare) far more often than leadership acknowledges. Transportation access (BARR-04) appears in 41% of community segments versus 6% of leadership segments. The Research Infrastructure pillar slipped 5 points.",
      "The user is currently viewing the \"" + where + "\" screen.",
      "Answer concisely: 2\u20134 short sentences or a tight bulleted list, under 110 words. Use **bold** for key figures. Never invent verbatim quotes or specific interview IDs. If the user simply greets you or asks something general, respond warmly and briefly, then offer a useful next step.",
      "",
      "User: " + q,
    ].join("\n");
  }

  function fmt(t) {
    return t.split('**').map((s, i) => i % 2 ? <strong key={i} style={{ color: 'var(--ink-900)' }}>{s}</strong> : <React.Fragment key={i}>{s}</React.Fragment>);
  }

  function Copilot({ open, onClose, screen }) {
    const [msgs, setMsgs] = React.useState([]);
    const [typing, setTyping] = React.useState('');
    const [busy, setBusy] = React.useState(false);
    const [thinking, setThinking] = React.useState(false);
    const bodyRef = React.useRef(null);
    const timers = React.useRef([]);
    const reqRef = React.useRef(0);
    const suggestions = SUGGEST[screen] || SUGGEST.default;

    React.useEffect(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, [msgs, typing, thinking]);

    // Cancel any in-flight typewriter/timeout so a new question can't be clobbered by an old one.
    function cancelPending() {
      timers.current.forEach((id) => { clearInterval(id); clearTimeout(id); });
      timers.current = [];
      reqRef.current += 1; // invalidate any in-flight Copilot request
    }

    React.useEffect(() => () => cancelPending(), []);

    // Typewriter-reveal a finished answer, then commit it as a message.
    function typeOut(ans) {
      let i = 0;
      const id = setInterval(() => {
        i += 5;
        setTyping(ans.slice(0, i));
        if (i >= ans.length) {
          clearInterval(id);
          setTyping('');
          setBusy(false);
          setMsgs((m) => [...m, { role: 'ai', text: ans }]);
        }
      }, 12);
      timers.current.push(id);
    }

    const FALLBACK = "Here's what the evidence shows for this view. I cross-referenced the coding matrix and engagement-circle shares — the strongest signal is the **Voice–Authority divergence**, concentrated in community-raised logistical barriers. Ask me to pull the supporting quotes or draft a brief.";

    function ask(q) {
      cancelPending();
      const myReq = reqRef.current;
      setMsgs((m) => [...m, { role: 'user', text: q }]);
      setTyping('');
      setThinking(false);
      setBusy(true);

      // Headline questions keep their curated, instant answers.
      if (ANSWERS[q]) {
        const start = setTimeout(() => typeOut(ANSWERS[q]), 220);
        timers.current.push(start);
        return;
      }

      // Everything else gets a real, grounded Copilot response.
      if (!(window.claude && typeof window.claude.complete === 'function')) {
        const start = setTimeout(() => typeOut(FALLBACK), 220);
        timers.current.push(start);
        return;
      }

      setThinking(true);
      window.claude.complete({ messages: [{ role: 'user', content: buildPrompt(q, screen) }] })
        .then((reply) => {
          if (myReq !== reqRef.current) return; // superseded by a newer question
          setThinking(false);
          typeOut((reply || '').trim() || FALLBACK);
        })
        .catch(() => {
          if (myReq !== reqRef.current) return;
          setThinking(false);
          typeOut(FALLBACK);
        });
    }

    if (!open) return null;

    return (
      <div className="heart-copilot-drawer" style={{
        position: 'fixed', top: 0, right: 0, height: '100vh', width: 380, zIndex: 40,
        background: 'var(--white)', borderLeft: '1px solid var(--border-default)', boxShadow: 'var(--shadow-lg)',
        display: 'flex', flexDirection: 'column',
      }}>
        <header style={{ padding: '16px 18px', borderBottom: '1px solid var(--border-divider)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
            <span style={{ width: 28, height: 28, borderRadius: 'var(--radius-sm)', background: 'var(--scarlet-500)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><window.Icon.sparkle size={16} /></span>
            <div style={{ lineHeight: 1.2 }}>
              <div style={{ font: 'var(--type-title)', color: 'var(--ink-900)' }}>HEART Copilot</div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-400)' }}>Bedrock · grounded in coding matrix</div>
            </div>
          </div>
          <button type="button" onClick={onClose} style={{ border: 'none', background: 'none', cursor: 'pointer', color: 'var(--ink-400)', fontSize: 20, lineHeight: 1 }}>×</button>
        </header>

        <div ref={bodyRef} style={{ flex: 1, overflowY: 'auto', padding: '18px', display: 'flex', flexDirection: 'column', gap: 14 }}>
          {msgs.length === 0 && (
            <div style={{ color: 'var(--ink-500)', font: 'var(--type-sm)', lineHeight: 1.6 }}>
              Ask anything about this view. I cite the coding matrix and never invent quotes.
            </div>
          )}
          {msgs.map((m, i) => (
            <div key={i} style={{ alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start', maxWidth: '92%' }}>
              {m.role === 'ai' && <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, color: 'var(--scarlet-600)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 5 }}>Copilot</div>}
              <div style={{
                font: 'var(--type-sm)', lineHeight: 1.6,
                color: m.role === 'user' ? '#fff' : 'var(--ink-700)',
                background: m.role === 'user' ? 'var(--slate-800)' : 'var(--ink-100)',
                padding: '10px 13px', borderRadius: m.role === 'user' ? '10px 10px 2px 10px' : '2px 10px 10px 10px',
                whiteSpace: 'pre-wrap',
              }}>{fmt(m.text)}</div>
            </div>
          ))}
          {typing && (
            <div style={{ alignSelf: 'flex-start', maxWidth: '92%' }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, color: 'var(--scarlet-600)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 5 }}>Copilot</div>
              <div style={{ font: 'var(--type-sm)', lineHeight: 1.6, color: 'var(--ink-700)', background: 'var(--ink-100)', padding: '10px 13px', borderRadius: '2px 10px 10px 10px', whiteSpace: 'pre-wrap' }}>{fmt(typing)}<span style={{ opacity: 0.5 }}>▋</span></div>
            </div>
          )}
          {thinking && (
            <div style={{ alignSelf: 'flex-start', maxWidth: '92%' }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, color: 'var(--scarlet-600)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 5 }}>Copilot</div>
              <div style={{ background: 'var(--ink-100)', padding: '12px 14px', borderRadius: '2px 10px 10px 10px', display: 'inline-flex', gap: 5, alignItems: 'center' }}>
                <span className="heart-dot"></span><span className="heart-dot" style={{ animationDelay: '160ms' }}></span><span className="heart-dot" style={{ animationDelay: '320ms' }}></span>
              </div>
            </div>
          )}
        </div>

        <div style={{ padding: '14px 16px', borderTop: '1px solid var(--border-divider)' }}>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 10 }}>
            {suggestions.map((s) => (
              <button key={s} type="button" disabled={busy} onClick={() => ask(s)} style={{ font: 'var(--type-sm)', color: busy ? 'var(--ink-300)' : 'var(--ink-600)', background: 'var(--white)', border: '1px solid var(--border-default)', borderRadius: 'var(--radius-pill)', padding: '5px 11px', cursor: busy ? 'default' : 'pointer', opacity: busy ? 0.6 : 1, textAlign: 'left' }}>{s}</button>
            ))}
          </div>
          <form onSubmit={(e) => { e.preventDefault(); if (busy) return; const v = e.target.q.value.trim(); if (v) { ask(v); e.target.reset(); } }} style={{ display: 'flex', gap: 8, alignItems: 'center', background: 'var(--ink-100)', border: '1px solid var(--border-default)', borderRadius: 'var(--radius-sm)', padding: '4px 4px 4px 12px' }}>
            <input name="q" disabled={busy} placeholder={busy ? 'Copilot is responding…' : 'Ask the Copilot…'} style={{ flex: 1, border: 'none', background: 'transparent', outline: 'none', font: 'var(--type-body)', color: 'var(--ink-800)', padding: '7px 0' }} />
            <button type="submit" disabled={busy} style={{ border: 'none', background: busy ? 'var(--ink-300)' : 'var(--scarlet-500)', color: '#fff', borderRadius: 'var(--radius-xs)', width: 32, height: 32, cursor: busy ? 'default' : 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><window.Icon.arrowRight size={16} /></button>
          </form>
        </div>
      </div>
    );
  }

  window.Copilot = Copilot;
})();

</script>

<script type="text/babel" data-module="AppShell">
/* HEART platform application shell — sidebar + topbar + content frame.
   Responsive: on phones the sidebar becomes an off-canvas drawer and the
   top bar condenses to icon actions. */

const NAV = [
  { section: 'Intelligence', items: [
    { id: 'overview', label: 'Executive Command Center', icon: 'gauge' },
    { id: 'readiness', label: 'Readiness Score', icon: 'gauge' },
    { id: 'voice', label: 'Voice vs Authority', icon: 'scale', flag: true },
    { id: 'theme', label: 'Theme Intelligence', icon: 'network' },
    { id: 'circle', label: 'Engagement & Stakeholders', icon: 'users' },
    { id: 'gap', label: 'Gaps & Barriers', icon: 'alert' },
  ]},
  { section: 'Evidence', items: [
    { id: 'quotes', label: 'Quote Explorer', icon: 'quote' },
    { id: 'matrix', label: 'Coding Matrix Explorer', icon: 'file' },
    { id: 'patterns', label: 'Connections, Trends & Geography', icon: 'network' },
    { id: 'coding', label: 'Coding Quality', icon: 'file' },
  ]},
  { section: 'Pipeline & Delivery', items: [
    { id: 'recommend', label: 'Programs & Blueprint', icon: 'sparkle' },
    { id: 'operations', label: 'Pipeline Operations', icon: 'flow' },
  ]},
];

// Small media-query hook so the shell can restructure on phones.
function useMedia(query) {
  const get = () => (typeof window !== 'undefined' && window.matchMedia ? window.matchMedia(query).matches : false);
  const [match, setMatch] = React.useState(get);
  React.useEffect(() => {
    const m = window.matchMedia(query);
    const on = () => setMatch(m.matches);
    on();
    m.addEventListener ? m.addEventListener('change', on) : m.addListener(on);
    return () => { m.removeEventListener ? m.removeEventListener('change', on) : m.removeListener(on); };
  }, [query]);
  return match;
}

function Logo() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
      <div style={{
        width: 34, height: 34, borderRadius: 'var(--radius-sm)', flex: 'none',
        background: 'var(--scarlet-500)', color: '#fff',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 19, letterSpacing: '-0.02em',
      }}>H</div>
      <div style={{ lineHeight: 1 }}>
        <div style={{ fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 16, color: 'var(--ink-900)', letterSpacing: '0.04em' }}>HEART</div>
        <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, color: 'var(--ink-400)', letterSpacing: '0.04em', marginTop: 3 }}>HEALTH EQUITY READINESS</div>
      </div>
    </div>
  );
}

function NavList({ active, onNavigate }) {
  return (
    <nav style={{ padding: '14px 12px', overflowY: 'auto', flex: 1 }}>
      {NAV.map((grp) => (
        <div key={grp.section} style={{ marginBottom: 18 }}>
          <div style={{ font: 'var(--type-eyebrow)', letterSpacing: 'var(--tracking-label)', textTransform: 'uppercase', color: 'var(--ink-400)', padding: '0 10px', marginBottom: 8 }}>{grp.section}</div>
          {grp.items.map((it) => {
            const on = active === it.id;
            const Glyph = window.Icon[it.icon];
            return (
              <button key={it.id} type="button" onClick={() => onNavigate(it.id)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 10, width: '100%',
                  padding: '10px 10px', marginBottom: 2, border: 'none', cursor: 'pointer',
                  borderRadius: 'var(--radius-sm)', textAlign: 'left',
                  background: on ? 'var(--scarlet-050)' : 'transparent',
                  color: on ? 'var(--scarlet-700)' : 'var(--ink-600)',
                  fontFamily: 'var(--font-sans)', fontSize: 14, fontWeight: on ? 600 : 500,
                  transition: 'background var(--dur-fast)',
                }}>
                <span style={{ color: on ? 'var(--scarlet-500)' : 'var(--ink-400)', display: 'inline-flex' }}><Glyph size={18} /></span>
                <span style={{ flex: 1 }}>{it.label}</span>
                {it.flag && <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--scarlet-500)' }} />}
              </button>
            );
          })}
        </div>
      ))}
    </nav>
  );
}

function UserCard() {
  return (
    <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border-divider)', display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{ width: 30, height: 30, borderRadius: 999, background: 'var(--circle-leadership)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-sans)', fontWeight: 600, fontSize: 12 }}>RA</div>
      <div style={{ lineHeight: 1.3 }}>
        <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 600, color: 'var(--ink-800)' }}>Research Author</div>
        <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-400)' }}>QuickSight · Author</div>
      </div>
    </div>
  );
}

/* Desktop sticky sidebar */
function Sidebar({ active, onNavigate }) {
  return (
    <aside style={{
      width: 'var(--sidebar-w)', flex: 'none', background: 'var(--white)',
      borderRight: '1px solid var(--border-divider)', height: '100vh',
      position: 'sticky', top: 0, display: 'flex', flexDirection: 'column',
    }}>
      <div style={{ padding: '18px 20px', borderBottom: '1px solid var(--border-divider)' }}><Logo /></div>
      <NavList active={active} onNavigate={onNavigate} />
      <UserCard />
    </aside>
  );
}

/* Mobile off-canvas drawer */
function Drawer({ open, onClose, active, onNavigate, onExec, theme, onToggleTheme }) {
  const ThemeIcon = window.Icon[theme === 'dark' ? 'sun' : 'moon'];
  return (
    <React.Fragment>
      <div onClick={onClose} style={{
        position: 'fixed', inset: 0, background: 'rgba(20,18,15,0.42)', zIndex: 40,
        opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none',
        transition: 'opacity var(--dur-base) var(--ease-out)',
      }} />
      <aside style={{
        position: 'fixed', top: 0, left: 0, height: '100dvh', width: 'min(86vw, 320px)', zIndex: 41,
        background: 'var(--white)', borderRight: '1px solid var(--border-divider)',
        display: 'flex', flexDirection: 'column', boxShadow: 'var(--shadow-lg)',
        transform: open ? 'translateX(0)' : 'translateX(-102%)',
        transition: 'transform var(--dur-base) var(--ease-out)',
      }}>
        <div style={{ padding: '16px 18px', borderBottom: '1px solid var(--border-divider)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <Logo />
          <button type="button" onClick={onClose} aria-label="Close menu" style={{ width: 36, height: 36, flex: 'none', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-default)', background: 'var(--white)', color: 'var(--ink-600)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>×</button>
        </div>
        <NavList active={active} onNavigate={(id) => { onNavigate(id); onClose(); }} />
        <div style={{ padding: '10px 12px', borderTop: '1px solid var(--border-divider)', display: 'flex', gap: 8 }}>
          <button type="button" onClick={() => { onToggleTheme(); }} style={{ flex: 1, height: 40, borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-default)', background: 'var(--white)', color: 'var(--ink-700)', cursor: 'pointer', font: 'var(--type-sm)', fontWeight: 600, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 7 }}><ThemeIcon size={16} />{theme === 'dark' ? 'Light' : 'Dark'}</button>
          <button type="button" onClick={() => { onExec(); onClose(); }} style={{ flex: 1, height: 40, borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-default)', background: 'var(--white)', color: 'var(--ink-700)', cursor: 'pointer', font: 'var(--type-sm)', fontWeight: 600, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 7 }}><window.Icon.gauge size={16} />Executive</button>
        </div>
        <UserCard />
      </aside>
    </React.Fragment>
  );
}

function IconBtn({ onClick, label, children }) {
  return (
    <button type="button" onClick={onClick} aria-label={label} title={label} style={{ width: 38, height: 38, flex: 'none', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-default)', background: 'var(--white)', color: 'var(--ink-600)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>{children}</button>
  );
}

function TopBar({ title, eyebrow, children, onOpenPalette, onOpenCopilot, onExec, theme, onToggleTheme, mobile, onOpenMenu }) {
  const ThemeIcon = window.Icon[theme === 'dark' ? 'sun' : 'moon'];

  if (mobile) {
    return (
      <header style={{
        minHeight: 'var(--topbar-h)', borderBottom: '1px solid var(--border-divider)',
        background: 'var(--bg-topbar)', backdropFilter: 'blur(8px)',
        position: 'sticky', top: 0, zIndex: 7,
        display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px',

        <button type="button" onClick={onOpenMenu} aria-label="Open menu" style={{ width: 38, height: 38, flex: 'none', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-default)', background: 'var(--white)', color: 'var(--ink-700)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div style={{ flex: 1, minWidth: 0 }}>
          {eyebrow && <div style={{ font: 'var(--type-eyebrow)', letterSpacing: 'var(--tracking-label)', textTransform: 'uppercase', color: 'var(--ink-400)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{eyebrow}</div>}
          <h1 style={{ font: 'var(--type-h3)', color: 'var(--ink-900)', margin: 0, letterSpacing: '-0.01em', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{title}</h1>
        </div>
        <IconBtn onClick={onOpenPalette} label="Search"><window.Icon.search size={17} /></IconBtn>
        <button type="button" onClick={onOpenCopilot} aria-label="Copilot" title="Copilot" style={{ width: 38, height: 38, flex: 'none', borderRadius: 'var(--radius-sm)', border: 'none', background: 'var(--slate-800)', color: '#fff', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><window.Icon.sparkle size={17} /></button>
      </header>
    );
  }

  return (
    <header style={{
      height: 'var(--topbar-h)', borderBottom: '1px solid var(--border-divider)',
      background: 'var(--bg-topbar)', backdropFilter: 'blur(8px)',
      position: 'sticky', top: 0, zIndex: 7,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '0 28px',
    }}>
      <div>
        {eyebrow && <div style={{ font: 'var(--type-eyebrow)', letterSpacing: 'var(--tracking-label)', textTransform: 'uppercase', color: 'var(--ink-400)' }}>{eyebrow}</div>}
        <h1 style={{ font: 'var(--type-h2)', color: 'var(--ink-900)', margin: 0, letterSpacing: '-0.01em' }}>{title}</h1>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <button type="button" onClick={onOpenPalette} style={{ display: 'inline-flex', alignItems: 'center', gap: 8, height: 36, padding: '0 12px', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-default)', background: 'var(--white)', color: 'var(--ink-400)', cursor: 'pointer', font: 'var(--type-sm)' }}>
          <window.Icon.search size={15} /><span>Search…</span>
          <kbd style={{ fontFamily: 'var(--font-mono)', fontSize: 10, border: '1px solid var(--border-default)', borderRadius: 4, padding: '1px 5px', color: 'var(--ink-400)' }}>⌘K</kbd>
        </button>
        {children}
        <button type="button" onClick={onToggleTheme} title="Toggle light / dark" style={{ width: 36, height: 36, borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-default)', background: 'var(--white)', color: 'var(--ink-600)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><ThemeIcon size={17} /></button>
        <button type="button" onClick={onExec} style={{ height: 36, padding: '0 12px', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-default)', background: 'var(--white)', color: 'var(--ink-600)', cursor: 'pointer', font: 'var(--type-sm)', fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 7 }}><window.Icon.gauge size={16} />Executive Mode</button>
        <button type="button" onClick={onOpenCopilot} style={{ height: 36, padding: '0 14px', borderRadius: 'var(--radius-sm)', border: 'none', background: 'var(--slate-800)', color: '#fff', cursor: 'pointer', font: 'var(--type-sm)', fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 7 }}><window.Icon.sparkle size={16} />Copilot</button>
      </div>
    </header>
  );
}

function AppShell({ active, onNavigate, title, eyebrow, onOpenPalette, onOpenCopilot, onExec, filterBar, children, theme, onToggleTheme }) {
  const mobile = useMedia('(max-width: 860px)');

        {filterBar}

}

<script type="text/babel" data-module="VoiceVsAuthority">
/* Voice vs Authority — flagship divergence experience.
   Divergence + alignment scores, diverging chart, heatmap, blind-spot alerts, AI narrative. */
function VoiceVsAuthority({ onNavigate, filters }) {
  const { Panel, Badge, CircleBadge, Button, Tag } = window.HEARTDesignSystem_d7d056;
  const K = window.Kit, Charts = window.Charts, D = window.HEART_DATA;

  const lens = D.derive(filters);
  const themes = [...lens.themes].map((t) => ({ ...t })).sort((a, b) => b.gap - a.gap);
  const max = Math.max(...themes.map((t) => Math.max(t.community, t.leadership)));
  const divergence = Math.round(themes.reduce((a, t) => a + Math.abs(t.gap), 0) / themes.length);
  const alignment = Math.max(0, 100 - divergence * 3);

  function gapTone(gap) {
    if (gap >= 25) return 'critical';
    if (gap >= 12) return 'caution';
    if (gap <= -12) return 'info';
    return 'neutral';
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
      {/* Score banner */}
      <div style={{ background: 'var(--slate-900)', borderRadius: 'var(--radius-lg)', padding: '24px 28px', display: 'grid', gridTemplateColumns: 'auto auto 1fr', gap: 32, alignItems: 'center' }}>
        <div>
          <div style={{ font: 'var(--type-eyebrow)', letterSpacing: 'var(--tracking-label)', textTransform: 'uppercase', color: 'var(--slate-200)', marginBottom: 6 }}>Divergence index</div>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 52, fontWeight: 600, color: '#fff', lineHeight: 1 }}>{divergence}<span style={{ fontSize: 22, color: 'var(--slate-200)' }}> pts</span></div>
        </div>
        <div style={{ borderLeft: '1px solid var(--slate-700)', paddingLeft: 32 }}>
          <div style={{ font: 'var(--type-eyebrow)', letterSpacing: 'var(--tracking-label)', textTransform: 'uppercase', color: 'var(--slate-200)', marginBottom: 6 }}>Alignment score</div>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 52, fontWeight: 600, color: alignment < 60 ? '#E8A0AC' : '#7FD1A8', lineHeight: 1 }}>{alignment}<span style={{ fontSize: 22, color: 'var(--slate-200)' }}>/100</span></div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <CircleBadge circle={1} />
            <span style={{ alignSelf: 'center', color: 'var(--slate-600)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>versus</span>
            <CircleBadge circle={3} />
          </div>
          <p style={{ font: 'var(--type-body)', color: 'var(--slate-200)', margin: 0, flex: 1 }}>
            On average, themes diverge <strong style={{ color: '#fff' }}>{divergence} points</strong> between community and leadership. <strong style={{ color: '#E8A0AC' }}>{themes.filter((t) => t.gap >= 25).length} severe blind spots</strong> drive most of it.
          </p>
        </div>
      </div>

      {/* AI narrative */}
      <K.AIInsight title="AI-generated narrative for leadership" actions={[
        <Button key="r" size="sm" variant="secondary" onClick={() => window.pushToast('Narrative copied to report', 'positive')} iconLeft={<window.Icon.download size={14} />}>Add to report</Button>,
      ]}>
        Across 247 interviews, the community is consistent: <strong>the barriers to equity are logistical before they are clinical.</strong> Transportation, interpretation, and childcare dominate community voice yet rarely surface in leadership interviews. Meanwhile leadership over-indexes on workforce pipeline and research infrastructure. Closing this perception gap — not launching new programs — is the fastest available path to readiness gains this quarter.
      </K.AIInsight>

      {/* Diverging chart */}
      <Panel eyebrow="Divergence" title="Theme prevalence — Community vs Leadership" action={
        <div style={{ display: 'flex', gap: 14, alignItems: 'center', fontFamily: 'var(--font-sans)', fontSize: 12 }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: 'var(--circle-community)' }} />Community</span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: 'var(--circle-leadership)' }} />Leadership</span>
        </div>
      }>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '210px 1fr 1fr 80px', alignItems: 'center', fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-400)', textTransform: 'uppercase', letterSpacing: '0.04em', paddingBottom: 8, borderBottom: '1px solid var(--border-divider)' }}>
            <span>Theme</span><span style={{ textAlign: 'right', paddingRight: 12 }}>◄ Community</span><span style={{ paddingLeft: 12 }}>Leadership ►</span><span style={{ textAlign: 'right' }}>Gap</span>
          </div>
          {themes.map((t) => (
            <button key={t.code} type="button" onClick={() => onNavigate('quotes')} style={{ display: 'grid', gridTemplateColumns: '210px 1fr 1fr 80px', alignItems: 'center', padding: '8px 0', borderBottom: '1px solid var(--border-divider)', border: 'none', borderBottomStyle: 'solid', background: 'transparent', cursor: 'pointer', textAlign: 'left' }}>
              <div style={{ paddingRight: 12 }}>
                <div style={{ font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-800)' }}>{t.name}</div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-400)' }}>{t.code}</div>
              </div>
              <div style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 8, paddingRight: 12, borderRight: '2px solid var(--border-strong)' }}>
                <span style={{ fontFamily: 'var(--font-serif)', fontSize: 13, color: 'var(--circle-community)', fontWeight: 600, width: 22, textAlign: 'right' }}>{t.community}</span>
                <div style={{ width: (t.community / max) * 100 + '%', height: 16, background: 'var(--circle-community)', borderRadius: '3px 0 0 3px' }} />
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, paddingLeft: 12 }}>
                <div style={{ width: (t.leadership / max) * 100 + '%', height: 16, background: 'var(--circle-leadership)', borderRadius: '0 3px 3px 0' }} />
                <span style={{ fontFamily: 'var(--font-serif)', fontSize: 13, color: 'var(--circle-leadership)', fontWeight: 600, width: 22 }}>{t.leadership}</span>
              </div>
              <div style={{ textAlign: 'right' }}><Badge tone={gapTone(t.gap)}>{t.gap > 0 ? '+' : ''}{t.gap}</Badge></div>
            </button>
          ))}
        </div>
      </Panel>

      {/* Blind spot alerts */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16 }}>
        {themes.filter((t) => t.gap >= 25).map((t) => (
          <div key={t.code} style={{ background: 'var(--critical-100)', border: '1px solid #F2C2CA', borderRadius: 'var(--radius-md)', padding: '16px 18px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--critical-600)', marginBottom: 8 }}>
              <window.Icon.alert size={17} /><span style={{ font: 'var(--type-eyebrow)', letterSpacing: 'var(--tracking-label)', textTransform: 'uppercase' }}>Blind spot</span>
            </div>
            <div style={{ font: 'var(--type-title)', color: 'var(--ink-900)', marginBottom: 4 }}>{t.name}</div>
            <p style={{ font: 'var(--type-sm)', color: 'var(--ink-600)', margin: '0 0 12px' }}>Raised in <strong>{t.community}%</strong> of community interviews, only <strong>{t.leadership}%</strong> of leadership.</p>
            <Button size="sm" variant="secondary" onClick={() => onNavigate('quotes')} iconRight={<window.Icon.quote size={14} />}>See supporting quotes</Button>
          </div>
        ))}
      </div>
    </div>
  );
}

window.VoiceVsAuthority = VoiceVsAuthority;

</script>

<script type="text/babel" data-module="QuoteExplorer">
/* Quote Explorer — semantic search, AI summary, similar quotes, collections, compare. */
function QuoteExplorer({ onNavigate }) {
  const { Panel, Badge, CircleBadge, Tag, Input, Button } = window.HEARTDesignSystem_d7d056;
  const K = window.Kit, D = window.HEART_DATA;
  const [mode, setMode] = React.useState('semantic');
  const [q, setQ] = React.useState('');
  const [circle, setCircle] = React.useState('all');
  const [collection, setCollection] = React.useState([]);
  const [compare, setCompare] = React.useState([]);
  const [expanded, setExpanded] = React.useState(null);
  const [summary, setSummary] = React.useState(false);

  const circleColor = (c) => D.circles[c].color;
  let results = D.quotes.filter((x) => circle === 'all' || x.circle === +circle);
  if (q) results = results.filter((x) => (x.text + x.codes.join() + x.role).toLowerCase().includes(q.toLowerCase()));

  function toggleCollect(id) { setCollection((c) => c.includes(id) ? c.filter((x) => x !== id) : [...c, id]); window.pushToast(collection.includes(id) ? 'Removed from collection' : 'Added to collection', 'positive'); }
  function toggleCompare(id) { setCompare((c) => c.includes(id) ? c.filter((x) => x !== id) : c.length < 2 ? [...c, id] : [c[1], id]); }
  function similar(qq) { return D.quotes.filter((x) => x.id !== qq.id && x.codes.some((c) => qq.codes.includes(c))); }

  const cmpQuotes = compare.map((id) => D.quotes.find((x) => x.id === id));

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '240px 1fr', gap: 24, alignItems: 'start' }}>
      {/* Filter rail */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16, position: 'sticky', top: 124 }}>
        <Panel padded={true}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 14, color: 'var(--ink-700)' }}><window.Icon.filter size={16} /><span style={{ font: 'var(--type-title)' }}>Refine</span></div>
          <div style={{ font: 'var(--type-eyebrow)', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-400)', marginBottom: 8 }}>Engagement circle</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {[['all', 'All circles'], [1, 'Community Voice'], [2, 'Internal'], [3, 'Leadership']].map(([v, l]) => (
              <button key={v} type="button" onClick={() => setCircle(v)} style={{ display: 'flex', alignItems: 'center', gap: 8, border: 'none', background: circle === v ? 'var(--ink-100)' : 'transparent', borderRadius: 'var(--radius-sm)', padding: '7px 9px', cursor: 'pointer', font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-700)', textAlign: 'left' }}>
                {v !== 'all' && <span style={{ width: 8, height: 8, borderRadius: 999, background: circleColor(v) }} />}{l}
              </button>
            ))}
          </div>
        </Panel>
        {collection.length > 0 && (
          <Panel eyebrow="Collection" title={`${collection.length} saved`} action={<button type="button" onClick={() => window.pushToast('Citation bundle exported', 'positive')} style={{ border: 'none', background: 'none', cursor: 'pointer', color: 'var(--scarlet-600)' }}><window.Icon.download size={16} /></button>}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>{collection.map((id) => <Tag key={id} removable onRemove={() => toggleCollect(id)}>{id.replace('INT-2026-', '#')}</Tag>)}</div>
            <Button variant="secondary" size="sm" fullWidth style={{ marginTop: 12 }} iconLeft={<window.Icon.file size={14} />}>Build citation</Button>
          </Panel>
        )}
      </div>

      {/* Results */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div style={{ display: 'flex', gap: 12, alignItems: 'flex-end' }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: 'inline-flex', background: 'var(--ink-100)', borderRadius: 'var(--radius-sm)', padding: 3, gap: 2, marginBottom: 8 }}>
              {[['semantic', 'Semantic'], ['exact', 'Exact'], ['theme', 'By theme']].map(([v, l]) => (
                <button key={v} type="button" onClick={() => setMode(v)} style={{ border: 'none', cursor: 'pointer', borderRadius: 'var(--radius-xs)', padding: '4px 10px', font: 'var(--type-sm)', fontWeight: 600, background: mode === v ? 'var(--white)' : 'transparent', color: mode === v ? 'var(--scarlet-700)' : 'var(--ink-500)', boxShadow: mode === v ? 'var(--shadow-xs)' : 'none' }}>{l}</button>
              ))}
            </div>
            <Input iconLeft={<window.Icon.search size={16} />} placeholder={mode === 'semantic' ? 'Describe what you\u2019re looking for — e.g. \u201Cpeople struggling to reach care\u201D' : 'Search exact words'} value={q} onChange={(e) => setQ(e.target.value)} />
          </div>
          <Button onClick={() => setSummary(true)} iconLeft={<window.Icon.sparkle size={15} />}>Summarize {results.length}</Button>
          <Button variant={compare.length ? 'primary' : 'secondary'} onClick={() => setCompare(compare.length ? [] : compare)} iconLeft={<window.Icon.scale size={15} />}>{compare.length ? `Comparing ${compare.length}` : 'Compare'}</Button>
        </div>

        {mode === 'semantic' && q && <div style={{ font: 'var(--type-meta)', color: 'var(--ink-400)' }}>Semantic match · ranked by meaning, not keywords</div>}

        {summary && (
          <K.AIInsight title={`Summary of ${results.length} quotes`} actions={[<Button key="c" size="sm" variant="ghost" onClick={() => setSummary(false)}>Dismiss</Button>]}>
            These quotes converge on <strong>access friction</strong>: transportation, language, and trust recur across community voices, while leadership quotes acknowledge the pipeline but admit limited community input. Sentiment is <strong>net-negative for community</strong> ({Math.round(results.filter((r) => r.circle === 1).reduce((a, b) => a + b.sentiment, 0) / Math.max(1, results.filter((r) => r.circle === 1).length) * 100)}%) and neutral for leadership.
          </K.AIInsight>
        )}

        {cmpQuotes.length === 2 && (
          <Panel eyebrow="Compare" title="Side by side" action={<button type="button" onClick={() => setCompare([])} style={{ border: 'none', background: 'none', cursor: 'pointer', color: 'var(--ink-400)', fontSize: 18 }}>×</button>}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
              {cmpQuotes.map((c) => (
                <div key={c.id} style={{ borderLeft: `3px solid ${circleColor(c.circle)}`, paddingLeft: 14 }}>
                  <CircleBadge circle={c.circle} size="sm" />
                  <p style={{ fontFamily: 'var(--font-serif)', fontSize: 16, lineHeight: 1.5, color: 'var(--ink-900)', margin: '10px 0' }}>{c.text}</p>
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{c.codes.map((cd) => <Badge key={cd} tone="neutral">{cd}</Badge>)}</div>
                </div>
              ))}
            </div>
          </Panel>
        )}

        <div style={{ font: 'var(--type-sm)', color: 'var(--ink-500)' }}><strong style={{ color: 'var(--ink-800)' }}>{results.length}</strong> quotes{circle !== 'all' ? ` · ${D.circles[circle].label}` : ''}</div>

        {results.map((qq) => (
          <article key={qq.id} style={{ background: 'var(--white)', border: 'var(--border-card)', borderRadius: 'var(--radius-md)', boxShadow: 'var(--shadow-sm)', padding: '20px 24px', borderLeft: `3px solid ${circleColor(qq.circle)}` }}>
            <p style={{ fontFamily: 'var(--font-serif)', fontSize: 19, lineHeight: 1.5, color: 'var(--ink-900)', margin: '0 0 16px', textWrap: 'pretty' }}>
