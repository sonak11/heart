                <button type="button" onClick={() => toggleCollect(qq.id)} title="Save" style={{ width: 30, height: 30, border: `1px solid ${collection.includes(qq.id) ? 'var(--scarlet-500)' : 'var(--border-default)'}`, background: collection.includes(qq.id) ? 'var(--scarlet-050)' : 'var(--white)', color: collection.includes(qq.id) ? 'var(--scarlet-600)' : 'var(--ink-400)', borderRadius: 'var(--radius-sm)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><window.Icon.check size={14} /></button>
                <button type="button" onClick={() => setExpanded(expanded === qq.id ? null : qq.id)} style={{ border: '1px solid var(--border-default)', background: 'var(--white)', borderRadius: 'var(--radius-sm)', padding: '6px 10px', cursor: 'pointer', font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-600)', fontFamily: 'var(--font-mono)' }}>{qq.id}</button>
              </span>
            </div>
            {expanded === qq.id && (
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px dashed var(--border-strong)' }}>
                <div style={{ font: 'var(--type-eyebrow)', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-400)', marginBottom: 10 }}>Similar quotes · evidence chain</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {similar(qq).map((s) => (
                    <div key={s.id} style={{ display: 'flex', gap: 10, alignItems: 'flex-start', padding: '8px 12px', background: 'var(--ink-100)', borderRadius: 'var(--radius-sm)' }}>
                      <span style={{ width: 6, height: 6, borderRadius: 999, background: circleColor(s.circle), marginTop: 7, flex: 'none' }} />
                      <span style={{ font: 'var(--type-sm)', color: 'var(--ink-600)', lineHeight: 1.5 }}>{s.text.slice(0, 110)}… <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-400)' }}>{s.id}</span></span>
                    </div>
                  ))}
                  {similar(qq).length === 0 && <div style={{ font: 'var(--type-sm)', color: 'var(--ink-400)' }}>No similar quotes in the current corpus.</div>}
                </div>
              </div>
            )}
          </article>
        ))}
      </div>
    </div>
  );
}

window.QuoteExplorer = QuoteExplorer;

</script>

<script type="text/babel" data-module="DashboardsA">
/* Dashboards A — Readiness Score · Theme Intelligence · Emerging Themes */
(function () {
  const G = window.HEART_DATA;
  const C = window.Charts;
  const K = window.Kit;
  const UI = window.HEARTDesignSystem_d7d056;

  // ============================= READINESS SCORE =============================
  function ReadinessScore({ onNavigate, filters }) {
    const { Panel, Badge, Button, KpiCard } = UI;
    const { Gauge, Sparkline, HBars } = C;
    const r = G.readiness;
    const d = G.derive(filters);
    const composite = d.composite;
    const prior = composite - (filters && filters.time === 'q1' ? -5 : 5);
    const delta = composite - prior;
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
        <window.Kit.LensHeader filters={filters} />
        <K.Grid cols={3} style={{ gridTemplateColumns: '1.1fr 1fr 1fr' }}>
          <Panel eyebrow="Composite index" title="Health Equity Readiness Score">
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
              <Gauge value={composite} color={composite >= 70 ? 'var(--positive-500)' : 'var(--caution-500)'} label="of 100" size={240} />
              <Badge tone={delta >= 0 ? 'positive' : 'critical'} dot>{delta >= 0 ? '+' : ''}{delta} {d.tm.priorLabel}</Badge>
              <div style={{ marginTop: 10 }}><Sparkline values={d.time === 'q1' ? r.history.slice(0, 5) : r.history} w={200} h={40} color="var(--circle-internal)" /></div>
            </div>
          </Panel>
          <Panel eyebrow="Weighted drivers" title="What moves the score" action={<K.Tooltip label="Score = Σ(driver × weight)"><span style={{ color: 'var(--ink-400)' }}><window.Icon.alert size={15} /></span></K.Tooltip>}>
            <HBars items={r.drivers.map((d) => ({ label: d.label, value: d.value, color: d.value < 55 ? 'var(--critical-500)' : 'var(--circle-internal)' }))} max={100} />
          </Panel>
          <Panel eyebrow="By pillar" title="Pillar readiness">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {G.pillars.map((p) => (
                <button key={p.id} type="button" onClick={() => onNavigate('theme')} style={{ display: 'grid', gridTemplateColumns: '1fr auto auto', gap: 10, alignItems: 'center', border: 'none', background: 'transparent', cursor: 'pointer', textAlign: 'left', padding: 0 }}>
                  <span style={{ font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-800)' }}>{p.name}</span>
                  <Sparkline values={[p.prior, (p.prior+p.score)/2, p.score]} w={48} h={20} color={p.score < 60 ? 'var(--critical-500)' : p.color} fill={false} />
                  <span style={{ fontFamily: 'var(--font-serif)', fontSize: 18, fontWeight: 600, color: p.score < 60 ? 'var(--critical-600)' : 'var(--ink-800)', width: 28, textAlign: 'right' }}>{p.score}</span>
                </button>
              ))}
            </div>
          </Panel>
        </K.Grid>
        <K.AIInsight actions={[<Button key="a" size="sm" variant="secondary" onClick={() => onNavigate('voice')} iconRight={<window.Icon.arrowRight size={14} />}>See the gap</Button>]}>
          The score is held back most by <strong>community alignment (49/100)</strong>. Modeling suggests closing the top two voice gaps — transportation and interpretation access — would lift the composite to an estimated <strong>74</strong> next quarter, the largest single-lever move available.
        </K.AIInsight>
      </div>
    );
  }

  // ============================= THEME INTELLIGENCE =============================
  function ThemeIntelligence({ onNavigate }) {
    const { Panel, Badge, Button, Tag } = UI;
    const { Sparkline } = C;
    const [sel, setSel] = React.useState(null);
    const [sort, setSort] = React.useState('segments');
    const themes = [...G.themes].sort((a, b) => sort === 'segments' ? b.segments - a.segments : b.gap - a.gap);
    const sub = { 'BARR-04': ['Bus routes', 'Ride share', 'Distance', 'Parking'], 'BARR-11': ['Interpreters', 'Translated forms', 'Bilingual staff'], 'FAC-02': ['Prior harm', 'Representation', 'Continuity'] };

    return (
      <div style={{ display: 'grid', gridTemplateColumns: sel ? '1fr 340px' : '1fr', gap: 24, alignItems: 'start' }}>
        <Panel eyebrow="All parent codes" title="Theme intelligence" padded={false} action={
          <div style={{ display: 'inline-flex', gap: 4, padding: '0 4px' }}>
            {[['segments', 'Volume'], ['gap', 'Voice gap']].map(([k, l]) => <button key={k} type="button" onClick={() => setSort(k)} style={{ border: 'none', background: sort === k ? 'var(--ink-100)' : 'transparent', borderRadius: 'var(--radius-xs)', padding: '5px 10px', font: 'var(--type-sm)', fontWeight: 600, color: sort === k ? 'var(--ink-800)' : 'var(--ink-400)', cursor: 'pointer' }}>{l}</button>)}
          </div>
        }>
          <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr 90px 70px 60px', padding: '10px 20px', borderBottom: '1px solid var(--border-divider)', font: 'var(--type-eyebrow)', textTransform: 'uppercase', letterSpacing: '0.04em', color: 'var(--ink-400)' }}>
            <span>Theme</span><span>Prevalence by circle</span><span>Trend</span><span style={{ textAlign: 'right' }}>Segs</span><span style={{ textAlign: 'right' }}>Gap</span>
          </div>
          {themes.map((t) => {
            const tot = t.community + t.internal + t.leadership;
            return (
              <button key={t.code} type="button" onClick={() => setSel(t)} style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr 90px 70px 60px', alignItems: 'center', width: '100%', textAlign: 'left', border: 'none', borderBottom: '1px solid var(--border-divider)', background: sel && sel.code === t.code ? 'var(--scarlet-050)' : 'transparent', cursor: 'pointer', padding: '11px 20px' }}>
                <span><span style={{ font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-800)' }}>{t.name}</span> {t.emerging && <Badge tone="caution">emerging</Badge>}<div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-400)' }}>{t.code} · {t.parent}</div></span>
                <span style={{ display: 'flex', height: 12, borderRadius: 3, overflow: 'hidden', marginRight: 12 }}>
                  <span style={{ width: (t.community / tot) * 100 + '%', background: 'var(--circle-community)' }} />
                  <span style={{ width: (t.internal / tot) * 100 + '%', background: 'var(--circle-internal)' }} />
                  <span style={{ width: (t.leadership / tot) * 100 + '%', background: 'var(--circle-leadership)' }} />
                </span>
                <Sparkline values={t.trend} w={70} h={22} color="var(--ink-400)" fill={false} />
                <span style={{ fontFamily: 'var(--font-serif)', fontSize: 15, fontWeight: 600, color: 'var(--ink-800)', textAlign: 'right' }}>{t.segments}</span>
                <span style={{ textAlign: 'right' }}><Badge tone={t.gap >= 25 ? 'critical' : t.gap >= 12 ? 'caution' : t.gap <= -12 ? 'info' : 'neutral'}>{t.gap > 0 ? '+' : ''}{t.gap}</Badge></span>
              </button>
            );
          })}
        </Panel>

        {sel && (
          <Panel eyebrow={sel.code} title={sel.name} action={<button type="button" onClick={() => setSel(null)} style={{ border: 'none', background: 'none', cursor: 'pointer', color: 'var(--ink-400)', fontSize: 18 }}>×</button>}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <Badge tone="neutral">{sel.segments} segments</Badge>
                <Badge tone={sel.gap >= 25 ? 'critical' : 'caution'}>gap {sel.gap > 0 ? '+' : ''}{sel.gap}</Badge>
                <Badge tone="neutral">{G.pillarName(sel.pillar)}</Badge>
              </div>
              <div>
                <div style={{ font: 'var(--type-eyebrow)', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-400)', marginBottom: 8 }}>Subcodes</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>{(sub[sel.code] || ['—']).map((s) => <Tag key={s}>{s}</Tag>)}</div>
              </div>
              <K.AIInsight title="Summarize this theme">
                {sel.name} is raised in <strong>{sel.community}%</strong> of community vs <strong>{sel.leadership}%</strong> of leadership interviews{sel.emerging ? ' and is accelerating quarter over quarter' : ''}. {sel.gap >= 25 ? 'It is a high-priority blind spot.' : 'Recognition is comparatively balanced.'}
              </K.AIInsight>
              <Button variant="secondary" fullWidth onClick={() => onNavigate('quotes')} iconRight={<window.Icon.quote size={14} />}>View {sel.segments} supporting quotes</Button>
            </div>
          </Panel>
        )}
      </div>
    );
  }

  // ============================= EMERGING THEMES =============================
  function EmergingThemes({ onNavigate }) {
    const { Panel, Badge, Button } = UI;
    const { Sparkline } = C;
    const em = G.themes.filter((t) => t.emerging).map((t) => ({ ...t, momentum: t.trend[5] - t.trend[3] })).sort((a, b) => b.momentum - a.momentum);
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
        <K.AIInsight title="Emerging signal detection">
          <strong>{em.length} themes</strong> are accelerating faster than the corpus average. <strong>Language &amp; interpretation</strong> shows the steepest rise (+{em[0].momentum} in two quarters) — flag for the next leadership review before it becomes a crisis.
        </K.AIInsight>
        <K.Grid cols={3}>
          {em.map((t) => (
            <Panel key={t.code} eyebrow={t.code} title={t.name}>
              <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 12 }}>
                <div>
                  <div style={{ fontFamily: 'var(--font-serif)', fontSize: 32, fontWeight: 600, color: 'var(--circle-community)' }}>+{t.momentum}</div>
                  <div style={{ font: 'var(--type-meta)', color: 'var(--ink-400)' }}>momentum · 2 quarters</div>
                </div>
                <Sparkline values={t.trend} w={90} h={40} color="var(--circle-community)" />
              </div>
              <Button variant="ghost" size="sm" onClick={() => onNavigate('theme')} iconRight={<window.Icon.arrowRight size={13} />}>Investigate</Button>
            </Panel>
          ))}
        </K.Grid>
      </div>
    );
  }

  window.ReadinessScore = ReadinessScore;
  window.ThemeIntelligence = ThemeIntelligence;
  window.EmergingThemes = EmergingThemes;
})();

</script>

<script type="text/babel" data-module="DashboardsB">

            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>

                <div key={x.role} style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8, alignItems: 'center' }}>
                  <span style={{ font: 'var(--type-sm)', color: 'var(--ink-700)' }}>{x.role}</span>
                  <div style={{ display: 'flex', gap: 3 }}>
                    {Array.from({ length: 7 }).map((_, i) => <span key={i} style={{ width: 8, height: 14, borderRadius: 2, background: i < Math.round(x.themes) ? G.circles[x.circle].color : 'var(--ink-150)' }} />)}
                  </div>
                </div>
              ))}
            </div>
            <K.AIInsight title="Compare stakeholder groups">
              Community participants raise <strong>1.7× more distinct themes</strong> per interview than leadership — and a different set. Leadership clusters on workforce &amp; research; community on logistical access.
            </K.AIInsight>
          </Panel>
        </K.Grid>
      </div>
    );
  }

  // ============================= GAP ANALYSIS =============================
  function GapAnalysis({ onNavigate }) {
    const { Panel, Badge, Button } = UI;
    const { Heatmap } = C;
    const themes = [...G.themes].sort((a, b) => b.gap - a.gap);
    const top = themes.slice(0, 6);
    const matrix = top.map((t) => [t.community, t.internal, t.leadership]);
    return (
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 360px', gap: 24, alignItems: 'start' }}>
        <Panel eyebrow="Prevalence heatmap" title="Theme × engagement circle">
          <Heatmap rows={top.map((t) => t.name)} cols={['Comm', 'Intern', 'Lead']} matrix={matrix} fmt={(v) => v} colorFn={C.heat} onCell={() => onNavigate('quotes')} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 16, font: 'var(--type-meta)', color: 'var(--ink-400)' }}>
            <span>low</span>
            <div style={{ display: 'flex', flex: 1, height: 8, borderRadius: 999, overflow: 'hidden' }}>{['heat-0','heat-1','heat-2','heat-3','heat-4','heat-5'].map((h) => <span key={h} style={{ flex: 1, background: `var(--${h})` }} />)}</div>
            <span>high prevalence</span>
          </div>
        </Panel>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Panel eyebrow="Opportunity detection" title="Largest closable gaps">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {top.filter((t) => t.gap > 0).slice(0, 4).map((t) => (
                <div key={t.code} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingBottom: 12, borderBottom: '1px solid var(--border-divider)' }}>
                  <div><div style={{ font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-800)' }}>{t.name}</div><div style={{ font: 'var(--type-meta)', color: 'var(--ink-400)' }}>{t.code} · {t.segments} segs</div></div>
                  <Badge tone={t.gap >= 25 ? 'critical' : 'caution'}>+{t.gap}</Badge>
                </div>
              ))}
            </div>
          </Panel>
          <K.AIInsight title="Identify outliers" actions={[<Button key="a" size="sm" variant="secondary" onClick={() => onNavigate('voice')}>Open Voice vs Authority</Button>]}>
            Three themes account for <strong>71% of total divergence</strong>. Acting on transportation and interpretation alone would close roughly half the aggregate gap.
          </K.AIInsight>
        </div>
      </div>
    );
  }

  // ============================= PROGRAM IMPACT =============================
  function ProgramImpact({ onNavigate }) {
    const { Panel, Badge, Button } = UI;
    const p = G.programs;
    const maxReach = Math.max(...p.map((x) => x.reach));
    function senTone(s) { return s >= 0.6 ? 'positive' : s >= 0.45 ? 'caution' : 'critical'; }
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
        <Panel eyebrow="All programs" title="Reach, evidence & sentiment" padded={false}>
          <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1.4fr 90px 1fr', padding: '10px 20px', borderBottom: '1px solid var(--border-divider)', font: 'var(--type-eyebrow)', textTransform: 'uppercase', letterSpacing: '0.04em', color: 'var(--ink-400)' }}>
            <span>Program</span><span>Reach</span><span style={{ textAlign: 'center' }}>Quotes</span><span>Sentiment</span>
          </div>
          {p.map((x) => (
            <div key={x.name} style={{ display: 'grid', gridTemplateColumns: '1.3fr 1.4fr 90px 1fr', alignItems: 'center', padding: '13px 20px', borderBottom: '1px solid var(--border-divider)' }}>
              <span style={{ font: 'var(--type-body)', fontWeight: 600, color: 'var(--ink-800)' }}>{x.name}</span>
              <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{ flex: 1, height: 12, background: 'var(--ink-100)', borderRadius: 3, overflow: 'hidden', maxWidth: 140 }}><div style={{ width: (x.reach / maxReach) * 100 + '%', height: '100%', background: 'var(--circle-internal)' }} /></div>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-500)' }}>{x.reach.toLocaleString()}</span>
              </span>
              <button type="button" onClick={() => onNavigate('quotes')} style={{ justifySelf: 'center', border: 'none', background: 'var(--ink-100)', borderRadius: 'var(--radius-pill)', padding: '3px 10px', fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--ink-600)', cursor: 'pointer' }}>{x.quotes}</button>
              <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{ flex: 1, height: 6, background: 'var(--ink-100)', borderRadius: 999, overflow: 'hidden', maxWidth: 120 }}><div style={{ width: x.sentiment * 100 + '%', height: '100%', background: `var(--${senTone(x.sentiment) === 'positive' ? 'positive-500' : senTone(x.sentiment) === 'caution' ? 'caution-500' : 'critical-500'})` }} /></div>
                <Badge tone={senTone(x.sentiment)}>{Math.round(x.sentiment * 100)}%</Badge>
              </span>
            </div>
          ))}
        </Panel>
        <K.AIInsight title="Explain this view">
          <strong>Telehealth access</strong> has the widest reach (5,100) but the weakest sentiment (41%) — community quotes cite language and device barriers. High reach is not translating to trust; pair it with interpretation support.
        </K.AIInsight>
      </div>
    );
  }

  window.StakeholderIntelligence = StakeholderIntelligence;
  window.GapAnalysis = GapAnalysis;
  window.ProgramImpact = ProgramImpact;
})();

</script>

<script type="text/babel" data-module="DashboardsC">
/* Dashboards C — Cross-Pillar Network · Trends & Timeline · Geographic */
(function () {
  const G = window.HEART_DATA;
  const C = window.Charts;
  const K = window.Kit;
  const UI = window.HEARTDesignSystem_d7d056;

  // ============================= DOMAIN CONNECTION NETWORK =============================
  function CrossPillarNetwork({ onNavigate, filters }) {
    const { Panel, Badge, Button, CircleBadge, Tag } = UI;
    const [sel, setSel] = React.useState('D5');
    const [hover, setHover] = React.useState(null);

    const stats = G.domainStats;
    const maxSeg = Math.max(...stats.map((s) => s.segments));
    const N = stats.length;
    const W = 600, H = 560, cx = W / 2, cy = H / 2, R = 215;
    const pos = {};
    stats.forEach((s, i) => {
      const a = (i / N) * Math.PI * 2 - Math.PI / 2;
      pos[s.id] = [cx + Math.cos(a) * R, cy + Math.sin(a) * R, a];
    });
    const focus = hover || sel;
    const neighbors = new Set(G.coocOf(focus).map((c) => c.other));
    const selStat = G.domainStat(sel);
    const selCooc = G.coocOf(sel);
    const totalC = selStat.c1 + selStat.c2 + selStat.c3;

    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 340px', gap: 20, alignItems: 'start' }}>
          <Panel eyebrow="Co-occurrence graph · all 13 domains" title="How themes connect across the corpus"
            action={<Badge tone="neutral">node = domain · edge = co-coded</Badge>}>
            <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: 'block', overflow: 'visible' }}>
              {/* edges */}
              {G.domainCooc.map((p, i) => {
                const A = pos[p.a], B = pos[p.b];
                const onPath = focus && (p.a === focus || p.b === focus);
                const dim = focus && !onPath;
                return <line key={i} x1={A[0]} y1={A[1]} x2={B[0]} y2={B[1]}
                  stroke={onPath ? 'var(--scarlet-500)' : 'var(--ink-400)'}
                  strokeWidth={1 + (p.w / 14)} strokeLinecap="round"
                  opacity={dim ? 0.05 : onPath ? 0.55 : 0.16} />;
              })}
              {/* center label */}
              <text x={cx} y={cy - 4} textAnchor="middle" style={{ fontFamily: 'var(--font-serif)', fontSize: 15, fontWeight: 600, fill: 'var(--ink-300)' }}>Health Equity</text>
              <text x={cx} y={cy + 14} textAnchor="middle" style={{ fontFamily: 'var(--font-mono)', fontSize: 10, fill: 'var(--ink-300)', letterSpacing: '0.08em' }}>CORPUS</text>
              {/* nodes */}
              {stats.map((s) => {
                const [x, y, a] = pos[s.id];
                const rr = 11 + (s.segments / maxSeg) * 20;
                const isFocus = focus === s.id;
                const isNeighbor = neighbors.has(s.id);
                const dim = focus && !isFocus && !isNeighbor;
                const lx = x + Math.cos(a) * (rr + 12), ly = y + Math.sin(a) * (rr + 12);
                const anchor = Math.abs(Math.cos(a)) < 0.3 ? 'middle' : Math.cos(a) > 0 ? 'start' : 'end';
                return (
                  <g key={s.id} style={{ cursor: 'pointer' }} opacity={dim ? 0.32 : 1}
                    onMouseEnter={() => setHover(s.id)} onMouseLeave={() => setHover(null)} onClick={() => setSel(s.id)}>
                    {sel === s.id && <circle cx={x} cy={y} r={rr + 5} fill="none" stroke={s.domain.color} strokeWidth="2" opacity="0.4" />}
                    <circle cx={x} cy={y} r={rr} fill={s.domain.color} opacity={isFocus ? 1 : 0.9} />
                    <text x={x} y={y + 4} textAnchor="middle" style={{ fontFamily: 'var(--font-mono)', fontSize: rr > 18 ? 11 : 9, fontWeight: 600, fill: '#fff', pointerEvents: 'none' }}>{s.domain.code}</text>
                    <text x={lx} y={ly + 3} textAnchor={anchor} style={{ fontFamily: 'var(--font-sans)', fontSize: 10.5, fontWeight: isFocus ? 700 : 500, fill: isFocus ? 'var(--ink-900)' : 'var(--ink-500)', pointerEvents: 'none' }}>{s.domain.name.split(' ').slice(0, 2).join(' ')}</text>
                  </g>
                );
              })}
            </svg>
            <div style={{ font: 'var(--type-meta)', color: 'var(--ink-400)', marginTop: 6, textAlign: 'center' }}>Node size = coded segments · hover to trace, click to inspect a domain</div>
          </Panel>

          {/* Detail panel */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <Panel eyebrow="Selected domain" title={selStat.domain.name} action={<span style={{ width: 12, height: 12, borderRadius: 3, background: selStat.domain.color }} />}>
              <div style={{ display: 'flex', gap: 18, marginBottom: 16 }}>
                <div><div style={{ fontFamily: 'var(--font-serif)', fontSize: 30, fontWeight: 600, color: 'var(--ink-900)' }}>{selStat.segments}</div><div style={{ font: 'var(--type-meta)', color: 'var(--ink-400)' }}>segments</div></div>
                <div><div style={{ fontFamily: 'var(--font-serif)', fontSize: 30, fontWeight: 600, color: selCooc[0].w >= 45 ? 'var(--scarlet-600)' : 'var(--ink-800)' }}>{selCooc.length}</div><div style={{ font: 'var(--type-meta)', color: 'var(--ink-400)' }}>connections</div></div>
              </div>
              {/* circle split */}
              <div style={{ font: 'var(--type-meta)', textTransform: 'uppercase', letterSpacing: 'var(--tracking-label)', color: 'var(--ink-400)', marginBottom: 7 }}>Who raises it</div>
              <div style={{ display: 'flex', height: 16, borderRadius: 4, overflow: 'hidden', marginBottom: 6 }}>
                {[['c1', 'var(--circle-community)'], ['c2', 'var(--circle-internal)'], ['c3', 'var(--circle-leadership)']].map(([k, col]) => (
                  <div key={k} title={`${k}: ${selStat[k]}`} style={{ width: (selStat[k] / totalC) * 100 + '%', background: col }} />
                ))}
              </div>
              <div style={{ display: 'flex', gap: 12, font: 'var(--type-meta)', color: 'var(--ink-500)' }}>
                <span><b style={{ color: 'var(--circle-community)' }}>{selStat.c1}</b> comm</span>
                <span><b style={{ color: 'var(--circle-internal)' }}>{selStat.c2}</b> int</span>
                <span><b style={{ color: 'var(--circle-leadership)' }}>{selStat.c3}</b> lead</span>
              </div>
            </Panel>

            <Panel eyebrow="Strongest links" title="Co-occurs most with">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
                {selCooc.slice(0, 5).map((c) => {
                  const d = G.domainById(c.other);
                  return (
                    <button key={c.other} type="button" onClick={() => setSel(c.other)} style={{ display: 'grid', gridTemplateColumns: '1fr 70px 30px', alignItems: 'center', gap: 8, border: 'none', background: 'transparent', cursor: 'pointer', padding: 0, textAlign: 'left' }}>
                      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 7, font: 'var(--type-sm)', color: 'var(--ink-700)', overflow: 'hidden' }}><span style={{ width: 8, height: 8, borderRadius: 2, background: d.color, flex: 'none' }} /><span style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{d.name}</span></span>
                      <div style={{ height: 7, background: 'var(--ink-100)', borderRadius: 999, overflow: 'hidden' }}><div style={{ width: c.w + '%', height: '100%', background: 'var(--scarlet-500)', borderRadius: 999 }} /></div>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-500)', textAlign: 'right' }}>{c.w}</span>
                    </button>
                  );
                })}
              </div>
              <Button size="sm" variant="secondary" fullWidth style={{ marginTop: 14 }} onClick={() => onNavigate('quotes')} iconRight={<window.Icon.quote size={13} />}>Quotes coded {selStat.domain.code}</Button>
            </Panel>
          </div>
        </div>

        {/* Strongest connections across corpus */}
        <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 20, alignItems: 'start' }}>
          <Panel eyebrow="Corpus-wide" title="Strongest theme connections">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px 22px' }}>
              {G.coocPairs.slice(0, 8).map((p, i) => {
                const A = G.domainById(p.a), B = G.domainById(p.b);
                return (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 0', borderBottom: '1px solid var(--border-divider)' }}>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-300)', width: 16 }}>{i + 1}</span>
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, font: 'var(--type-sm)', color: 'var(--ink-700)', flex: 1, overflow: 'hidden' }}>
                      <span style={{ width: 8, height: 8, borderRadius: 2, background: A.color, flex: 'none' }} />{A.code}
                      <span style={{ color: 'var(--ink-300)' }}>↔</span>
                      <span style={{ width: 8, height: 8, borderRadius: 2, background: B.color, flex: 'none' }} />{B.code}
                    </span>
                    <span style={{ fontFamily: 'var(--font-serif)', fontSize: 15, fontWeight: 600, color: p.w >= 45 ? 'var(--scarlet-600)' : 'var(--ink-700)' }}>{p.w}</span>
                  </div>
                );
              })}
            </div>
          </Panel>
          <K.AIInsight title="What the network shows">
            <strong>Barriers (D5)</strong> is the most connected domain — it co-occurs with community trust, relationship dynamics, and how community is defined. Logistical barriers are not an isolated complaint; they are the structural hub the whole corpus orbits. Severing the <strong>Barriers ↔ Community Experience</strong> tie (58%) — by fixing transportation, language, and childcare — would ripple across the most themes.
          </K.AIInsight>
        </div>
      </div>
    );
  }

  // ============================= TRENDS & TIMELINE =============================
  function TrendTimeline({ onNavigate }) {
    const { Panel, Badge, Button, CircleBadge } = UI;
    const { TrendChart } = C;
    const [scrub, setScrub] = React.useState(5);
    const [theme, setTheme] = React.useState(G.themes[0]);
    const series = [
      { label: 'Community', color: 'var(--circle-community)', values: theme.trend },
      { label: 'Internal', color: 'var(--circle-internal)', values: theme.trend.map((v, i) => Math.round(v * 0.6 + i)) },
      { label: 'Leadership', color: 'var(--circle-leadership)', values: theme.trend.map((v) => Math.round(v * 0.25 + 4)) },
    ];
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
        <Panel eyebrow="Timeline · drag to scrub" title={`Prevalence over time — ${theme.name}`} action={
          <select value={theme.code} onChange={(e) => setTheme(G.themeByCode(e.target.value))} style={{ appearance: 'none', font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-700)', background: 'var(--white)', border: '1px solid var(--border-default)', borderRadius: 'var(--radius-sm)', padding: '6px 12px', cursor: 'pointer' }}>
            {G.themes.map((t) => <option key={t.code} value={t.code}>{t.name}</option>)}
          </select>
        }>
          <div style={{ display: 'flex', gap: 16, marginBottom: 12 }}>
            {series.map((s) => <span key={s.label} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, font: 'var(--type-sm)', color: 'var(--ink-600)' }}><span style={{ width: 12, height: 3, background: s.color, borderRadius: 2 }} />{s.label}: <strong style={{ fontFamily: 'var(--font-serif)' }}>{s.values[scrub]}%</strong></span>)}
            <span style={{ marginLeft: 'auto', font: 'var(--type-meta)', color: 'var(--ink-400)' }}>{G.months[scrub]} 2026</span>
          </div>
          <TrendChart series={series} labels={G.months} scrub={scrub} onScrub={setScrub} />
          <input type="range" min="0" max="5" value={scrub} onChange={(e) => setScrub(+e.target.value)} style={{ width: '100%', marginTop: 10, accentColor: 'var(--scarlet-500)' }} />
        </Panel>
        <K.AIInsight title="Explain this chart">
          The community line for <strong>{theme.name}</strong> climbed from {theme.trend[0]}% to {theme.trend[5]}% over two quarters while leadership stayed flat — the divergence is <strong>widening</strong>, not closing.
        </K.AIInsight>
      </div>
    );
  }

  // ============================= GEOGRAPHIC =============================
  function Geographic({ onNavigate }) {
    const { Panel, Badge, Button } = UI;
    const { RegionMap } = C;
    const [active, setActive] = React.useState(null);
    const r = active || G.geo.find((x) => x.id === 'newbrunswick');
    return (
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 24, alignItems: 'start' }}>
        <Panel eyebrow="New Jersey · readiness signal" title="Geographic distribution" action={<Badge tone="neutral">click a region</Badge>}>
          <RegionMap regions={G.geo} active={r.id} onRegion={(x) => setActive(x)} />
        </Panel>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Panel eyebrow="Region detail" title={r.name}>
            <div style={{ display: 'flex', gap: 20, marginBottom: 14 }}>
              <div><div style={{ fontFamily: 'var(--font-serif)', fontSize: 32, fontWeight: 600, color: C.heat(r.value) }}>{r.value}</div><div style={{ font: 'var(--type-meta)', color: 'var(--ink-400)' }}>readiness</div></div>
              <div><div style={{ fontFamily: 'var(--font-serif)', fontSize: 32, fontWeight: 600, color: 'var(--ink-800)' }}>{r.interviews}</div><div style={{ font: 'var(--type-meta)', color: 'var(--ink-400)' }}>interviews</div></div>
            </div>
            <Button size="sm" variant="secondary" fullWidth onClick={() => onNavigate('quotes')} iconRight={<window.Icon.quote size={13} />}>Quotes from {r.name.split(' / ')[0]}</Button>
          </Panel>
          <K.AIInsight title="Find outliers">
            <strong>Camden (44)</strong> trails the state despite 26 interviews — transportation and childcare barriers dominate there. Prioritize for the mobile-clinic expansion.
          </K.AIInsight>
        </div>
      </div>
    );
  }

  window.CrossPillarNetwork = CrossPillarNetwork;
  window.TrendTimeline = TrendTimeline;
  window.Geographic = Geographic;
})();

</script>

<script type="text/babel" data-module="DashboardsD">
/* Dashboards D — Coding Quality / Human-vs-AI / Coverage / Recruitment · Recommendations */
(function () {
  const G = window.HEART_DATA;
  const C = window.Charts;
  const K = window.Kit;
  const UI = window.HEARTDesignSystem_d7d056;

  // ============================= CODING QUALITY =============================
  function CodingQuality({ onNavigate }) {
    const { Panel, Badge, KpiCard, Tabs } = UI;
    const { Heatmap } = C;
    const [tab, setTab] = React.useState('agreement');
    const cd = G.coding;
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
        <K.Grid cols={4}>
          <KpiCard label="AI ↔ human agreement" value="91" unit="%" accent="var(--positive-600)" trend="up" trendValue="+2" />
          <KpiCard label="Segments coded" value="5,840" caption="across 247 interviews" />
          <KpiCard label="Human-reviewed" value="36" unit="%" caption="2,106 segments QA'd" />
          <KpiCard label="Interview coverage" value="247" unit="/280" accent="var(--circle-internal)" caption="88% of scheduled" />
        </K.Grid>
        <Panel padded={false}>
          <div style={{ padding: '0 20px' }}><Tabs value={tab} onChange={setTab} tabs={[{ value: 'agreement', label: 'AI vs Human' }, { value: 'confusion', label: 'Confusion matrix' }, { value: 'coverage', label: 'Coverage & recruitment' }]} /></div>
          <div style={{ padding: 20 }}>
            {tab === 'agreement' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                {cd.aiVsHuman.map((x) => {
                  const max = Math.max(x.ai, x.human), agree = 100 - Math.round((Math.abs(x.ai - x.human) / max) * 100);
                  return (
                    <div key={x.code} style={{ display: 'grid', gridTemplateColumns: '90px 1fr 1fr 60px', gap: 12, alignItems: 'center' }}>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--ink-600)' }}>{x.code}</span>
                      <span style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 6 }}><span style={{ font: 'var(--type-meta)', color: 'var(--ink-400)' }}>AI {x.ai}</span><div style={{ width: (x.ai / max) * 100 + '%', maxWidth: 160, height: 12, background: 'var(--scarlet-400)', borderRadius: '3px 0 0 3px' }} /></span>
                      <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><div style={{ width: (x.human / max) * 100 + '%', maxWidth: 160, height: 12, background: 'var(--slate-600)', borderRadius: '0 3px 3px 0' }} /><span style={{ font: 'var(--type-meta)', color: 'var(--ink-400)' }}>Human {x.human}</span></span>
                      <Badge tone={agree >= 95 ? 'positive' : 'caution'}>{agree}%</Badge>
                    </div>
                  );
                })}
                <div style={{ display: 'flex', gap: 16, marginTop: 8, font: 'var(--type-sm)', color: 'var(--ink-500)' }}><span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: 'var(--scarlet-400)' }} />AI agent</span><span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: 'var(--slate-600)' }} />Human coder</span></div>
              </div>
            )}
            {tab === 'confusion' && (
              <div style={{ maxWidth: 480 }}>
                <Heatmap rows={cd.parents} cols={['Barr', 'Fac', 'Work', 'Res']} matrix={cd.confusion} fmt={(v) => v + '%'} colorFn={(v) => v > 80 ? 'var(--positive-500)' : v > 10 ? 'var(--caution-400, var(--caution-500))' : 'var(--ink-100)'} />
                <p style={{ font: 'var(--type-sm)', color: 'var(--ink-500)', marginTop: 14 }}>Diagonal = self-agreement. Off-diagonal cells show where the agent confuses one parent code for another. Highest confusion: Facilitators ↔ Workforce (7%).</p>
              </div>
            )}
            {tab === 'coverage' && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
                <div>
                  <div style={{ font: 'var(--type-eyebrow)', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-400)', marginBottom: 12 }}>Recruitment funnel</div>
                  {[['Invited', 412, 1], ['Scheduled', 280, 0.68], ['Conducted', 261, 0.63], ['Transcribed', 254, 0.62], ['Coded', 247, 0.6]].map(([l, n, f]) => (
                    <div key={l} style={{ marginBottom: 10 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', font: 'var(--type-sm)', marginBottom: 4 }}><span style={{ color: 'var(--ink-700)' }}>{l}</span><span style={{ fontFamily: 'var(--font-mono)', color: 'var(--ink-500)' }}>{n}</span></div>
                      <div style={{ height: 22, background: 'var(--ink-100)', borderRadius: 4, overflow: 'hidden' }}><div style={{ width: f * 100 + '%', height: '100%', background: 'var(--circle-internal)', opacity: 0.4 + f * 0.6 }} /></div>
                    </div>
                  ))}
                </div>
                <div>
                  <div style={{ font: 'var(--type-eyebrow)', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-400)', marginBottom: 12 }}>Coverage by circle</div>
                  {[1, 2, 3].map((c) => {
                    const pct = [92, 84, 71][c - 1];
                    return <div key={c} style={{ marginBottom: 14 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', font: 'var(--type-sm)', marginBottom: 4 }}><span style={{ color: 'var(--ink-700)' }}>{G.circles[c].label}</span><span style={{ fontFamily: 'var(--font-serif)', fontWeight: 600 }}>{pct}%</span></div>
                      <div style={{ height: 8, background: 'var(--ink-100)', borderRadius: 999, overflow: 'hidden' }}><div style={{ width: pct + '%', height: '100%', background: G.circles[c].color }} /></div>
                    </div>;
                  })}
                  <K.AIInsight title="Coverage gap">Leadership coverage (71%) lags. Six scheduled dean interviews remain — completing them will sharpen the Voice vs Authority comparison.</K.AIInsight>
                </div>
              </div>
            )}
          </div>
        </Panel>
      </div>
    );
  }

  // ============================= RECOMMENDATIONS =============================
  function Recommendations({ onNavigate }) {
    const { Panel, Badge, Button } = UI;
    const { Scatter } = C;
    const recs = G.recommendations;
    const tiers = { now: 'Do now', next: 'Do next', later: 'Later' };
    const tierTone = { now: 'critical', next: 'caution', later: 'neutral' };
    const points = recs.map((r) => ({ id: r.id, impact: r.impact, effort: r.effort, confidence: r.confidence, color: r.tier === 'now' ? 'var(--scarlet-500)' : r.tier === 'next' ? 'var(--caution-500)' : 'var(--ink-400)' }));
    return (
      <div style={{ display: 'grid', gridTemplateColumns: '380px 1fr', gap: 24, alignItems: 'start' }}>
        <Panel eyebrow="Prioritization" title="Impact vs effort">
          <Scatter points={points} onPoint={() => {}} />
          <p style={{ font: 'var(--type-meta)', color: 'var(--ink-400)', marginTop: 8 }}>Bubble size = AI confidence. Top-left = quick wins.</p>
        </Panel>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <K.AIInsight title="AI-generated recommendations">
            Ranked from <strong>{recs.length} interventions</strong> by modeled impact, effort, and evidence strength. Each is grounded in coded segments — click to trace the quotes behind it.
          </K.AIInsight>
          {recs.map((r) => (
            <div key={r.id} style={{ background: 'var(--white)', border: 'var(--border-card)', borderRadius: 'var(--radius-md)', boxShadow: 'var(--shadow-sm)', padding: '16px 18px', display: 'flex', gap: 14, alignItems: 'center' }}>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--ink-400)', width: 24 }}>{r.id}</span>
              <div style={{ flex: 1 }}>
                <div style={{ font: 'var(--type-body)', fontWeight: 600, color: 'var(--ink-900)' }}>{r.title}</div>
                <div style={{ display: 'flex', gap: 8, marginTop: 7, flexWrap: 'wrap' }}>
                  <Badge tone={tierTone[r.tier]}>{tiers[r.tier]}</Badge>
                  <Badge tone="neutral">{G.pillarName(r.pillar)}</Badge>
                  <Badge tone="neutral">{Math.round(r.confidence * 100)}% confidence</Badge>
                </div>
              </div>
              <button type="button" onClick={() => onNavigate('quotes')} style={{ border: '1px solid var(--border-default)', background: 'var(--white)', borderRadius: 'var(--radius-sm)', padding: '7px 11px', cursor: 'pointer', font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-600)', display: 'inline-flex', gap: 6, alignItems: 'center', whiteSpace: 'nowrap' }}>{r.evidence} segs<window.Icon.arrowRight size={13} /></button>
            </div>
          ))}
        </div>
      </div>
    );
  }

  window.CodingQuality = CodingQuality;
  window.Recommendations = Recommendations;
})();

</script>

<script type="text/babel" data-module="DashboardsE">
/* Matrix-anchored dashboards — IA emerges directly from the HEART coding matrix.
   Engagement Circle Intelligence · Blind Spot Detection · Authority Analysis · Coding Matrix Explorer */

// ============================================================
// 2 · ENGAGEMENT CIRCLE INTELLIGENCE
// ============================================================
function CircleIntelligence({ onNavigate, filters }) {
  const UI = window.HEARTDesignSystem_d7d056, C = window.Charts, K = window.Kit, G = window.HEART_DATA;
  const { Panel, Badge, CircleBadge, Button } = UI;
  const d = G.derive(filters);
  const pool = d.domainStats.length >= 4 ? d.domainStats : G.domainStats;
  // top domains by total prevalence for the radar axes
  const top = [...pool].sort((a, b) => b.segments - a.segments).slice(0, 7);
  const axes = top.map((d) => ({ label: d.domain.code }));
  const radarSeries = [
    { label: 'Community', color: 'var(--circle-community)', values: top.map((d) => d.c1) },
    { label: 'Internal', color: 'var(--circle-internal)', values: top.map((d) => d.c2) },
    { label: 'Leadership', color: 'var(--circle-leadership)', values: top.map((d) => d.c3) },
  ];
  const rows = top.map((d) => d.domain.code);
  const matrix = top.map((d) => [d.c1, d.c2, d.c3]);
  const aligned = [...pool].sort((a, b) => Math.abs(a.voiceGap) - Math.abs(b.voiceGap)).slice(0, 3);
  const diverged = [...pool].sort((a, b) => Math.abs(b.voiceGap) - Math.abs(a.voiceGap)).slice(0, 3);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
      <K.Grid cols={3} style={{ gridTemplateColumns: '1.1fr 1fr 1fr' }}>
        {G.authority && null}
        {[1, 2, 3].map((c) => {
          const cir = G.circles[c];
          const stat = G.domainStats.reduce((s, d) => s + (c === 1 ? d.c1 : c === 2 ? d.c2 : d.c3), 0);
          const lead = [...G.domainStats].sort((a, b) => (c === 1 ? b.c1 - a.c1 : c === 2 ? b.c2 - a.c2 : b.c3 - a.c3))[0];
          return (
            <Panel key={c} style={{ borderTop: `3px solid ${cir.color}` }}>
              <CircleBadge circle={c} />
              <div style={{ marginTop: 14, display: 'flex', alignItems: 'baseline', gap: 8 }}>
                <span style={{ fontFamily: 'var(--font-serif)', fontSize: 34, fontWeight: 600, color: 'var(--ink-900)' }}>{lead.domain.code}</span>
                <span style={{ font: 'var(--type-sm)', color: 'var(--ink-500)' }}>dominant domain</span>
              </div>
              <div style={{ font: 'var(--type-sm)', color: 'var(--ink-600)', marginTop: 4 }}>{lead.domain.name}</div>
            </Panel>
          );
        })}
      </K.Grid>

      <K.Grid cols={2} style={{ gridTemplateColumns: '1fr 1fr' }}>
        <Panel eyebrow="Where the circles diverge" title="Domain emphasis by engagement circle"
          action={<div style={{ display: 'flex', gap: 12, font: 'var(--type-sm)' }}>
            {radarSeries.map((s) => <span key={s.label} style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span style={{ width: 10, height: 10, borderRadius: 3, background: s.color }} />{s.label}</span>)}
          </div>}>
          <C.Radar axes={axes} series={radarSeries} size={340} max={48} />
        </Panel>
        <Panel eyebrow="Prevalence matrix" title="Domain × circle (share of coded segments)">
          <C.Heatmap rows={rows} cols={['C1', 'C2', 'C3']} matrix={matrix} fmt={(v) => v} onCell={() => onNavigate && onNavigate('voice')} />
          <div style={{ font: 'var(--type-meta)', color: 'var(--ink-400)', marginTop: 12 }}>Click any cell to open Voice vs Authority. Darker = higher share within that circle.</div>
        </Panel>
      </K.Grid>

      <K.Grid cols={2}>
        <Panel eyebrow="Consensus" title="Where perspectives align" action={<Badge tone="positive" dot>Shared ground</Badge>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {aligned.map((d) => (
              <div key={d.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: '1px solid var(--border-divider)' }}>
                <div><div style={{ font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-800)' }}>{d.domain.name}</div><div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-400)' }}>{d.domain.code} · C1 {d.c1}% · C3 {d.c3}%</div></div>
                <Badge tone="neutral">Δ {Math.abs(d.voiceGap)}</Badge>
              </div>
            ))}
          </div>
        </Panel>
        <Panel eyebrow="Tension" title="Where perspectives diverge" action={<Badge tone="critical" dot>Misalignment</Badge>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {diverged.map((d) => (
              <div key={d.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: '1px solid var(--border-divider)' }}>
                <div><div style={{ font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-800)' }}>{d.domain.name}</div><div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-400)' }}>{d.domain.code} · C1 {d.c1}% · C3 {d.c3}%</div></div>
                <Badge tone={d.voiceGap > 0 ? 'critical' : 'info'}>{d.voiceGap > 0 ? '+' : ''}{d.voiceGap}</Badge>
              </div>
            ))}
          </div>
        </Panel>
      </K.Grid>
    </div>
  );
}

// ============================================================
// 4 · BLIND SPOT DETECTION
// ============================================================
function BlindSpotDetection({ onNavigate, filters }) {
  const UI = window.HEARTDesignSystem_d7d056, C = window.Charts, K = window.Kit, G = window.HEART_DATA;
  const { Panel, Badge, Button } = UI;
  const dd = G.derive(filters);
  const pool = dd.domainStats.length >= 3 ? dd.domainStats : G.domainStats;
  const ranked = [...pool].sort((a, b) => b.blindspot - a.blindspot);
  const critical = ranked.filter((d) => d.blindspot >= 18);
  const index = Math.round(critical.reduce((s, d) => s + d.blindspot, 0) / Math.max(1, critical.length));
  const maxBs = ranked[0].blindspot;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
      <div style={{ background: 'var(--slate-900)', borderRadius: 'var(--radius-lg)', padding: '24px 28px', color: 'var(--slate-100)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 28 }}>
        <div style={{ maxWidth: 560 }}>
          <div style={{ font: 'var(--type-eyebrow)', letterSpacing: 'var(--tracking-label)', textTransform: 'uppercase', color: 'var(--slate-200)', marginBottom: 10 }}>Blind Spot Index · Q2 2026</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 14 }}>
            <span style={{ fontFamily: 'var(--font-serif)', fontSize: 60, fontWeight: 600, lineHeight: 0.95, color: '#fff' }}>{index}</span>
            <Badge tone="critical" dot>{critical.length} critical gaps</Badge>
          </div>
          <p style={{ font: 'var(--type-body)', color: 'var(--slate-200)', marginTop: 12, marginBottom: 0 }}>Composite of three divergences: <strong style={{ color: '#fff' }}>community vs leadership</strong>, <strong style={{ color: '#fff' }}>low vs high authority</strong>, and <strong style={{ color: '#fff' }}>directly vs indirectly affected</strong>. High values mean frontline voices raise an issue leadership rarely names.</p>
        </div>
        <div style={{ flex: 'none' }}><C.Gauge value={index} max={40} size={180} color="var(--critical-500)" label="index" /></div>
      </div>

      <Panel eyebrow="Ranked" title="Blind spot ranking — all 13 domains"
        action={<Button size="sm" variant="ghost" onClick={() => window.pushToast && window.pushToast('Exporting blind-spot register…', 'neutral')}>Export register</Button>}>
        <div style={{ display: 'grid', gridTemplateColumns: '22px 1fr 80px 80px 80px 120px', alignItems: 'center', gap: 10, font: 'var(--type-meta)', color: 'var(--ink-400)', textTransform: 'uppercase', letterSpacing: '0.04em', paddingBottom: 10, borderBottom: '1px solid var(--border-divider)' }}>
          <span>#</span><span>Domain</span><span style={{ textAlign: 'center' }}>Voice</span><span style={{ textAlign: 'center' }}>Author.</span><span style={{ textAlign: 'center' }}>Proxim.</span><span style={{ textAlign: 'right' }}>Blind spot</span>
        </div>
        {ranked.map((d, i) => (
          <div key={d.id} style={{ display: 'grid', gridTemplateColumns: '22px 1fr 80px 80px 80px 120px', alignItems: 'center', gap: 10, padding: '10px 0', borderBottom: '1px solid var(--border-divider)' }}>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--ink-400)' }}>{i + 1}</span>
            <div><div style={{ font: 'var(--type-sm)', fontWeight: 600, color: 'var(--ink-800)' }}>{d.domain.name}</div><div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-400)' }}>{d.domain.code}</div></div>
            <span style={{ textAlign: 'center', fontFamily: 'var(--font-serif)', fontSize: 14, color: d.voiceGap > 0 ? 'var(--critical-600)' : 'var(--ink-400)' }}>{d.voiceGap > 0 ? '+' : ''}{d.voiceGap}</span>
            <span style={{ textAlign: 'center', fontFamily: 'var(--font-serif)', fontSize: 14, color: d.authorityGap > 0 ? 'var(--critical-600)' : 'var(--ink-400)' }}>{d.authorityGap > 0 ? '+' : ''}{d.authorityGap}</span>
            <span style={{ textAlign: 'center', fontFamily: 'var(--font-serif)', fontSize: 14, color: d.proximityGap > 0 ? 'var(--critical-600)' : 'var(--ink-400)' }}>{d.proximityGap > 0 ? '+' : ''}{d.proximityGap}</span>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'flex-end' }}>
              <div style={{ width: 56, height: 8, background: 'var(--ink-100)', borderRadius: 999, overflow: 'hidden' }}>
                <div style={{ width: Math.max(0, (d.blindspot / maxBs) * 100) + '%', height: '100%', background: d.blindspot >= 18 ? 'var(--critical-500)' : 'var(--caution-500)', borderRadius: 999 }} />
              </div>
              <span style={{ fontFamily: 'var(--font-serif)', fontSize: 15, fontWeight: 600, color: 'var(--ink-900)', width: 26, textAlign: 'right' }}>{d.blindspot}</span>
            </div>
          </div>
        ))}
      </Panel>

      <div>
        <div style={{ font: 'var(--type-eyebrow)', letterSpacing: 'var(--tracking-label)', textTransform: 'uppercase', color: 'var(--ink-400)', marginBottom: 12 }}>Critical gap alerts</div>
        <K.Grid cols={3}>
          {critical.slice(0, 3).map((d) => (
            <div key={d.id} style={{ background: 'var(--critical-100)', border: '1px solid var(--critical-500)', borderRadius: 'var(--radius-md)', padding: '16px 18px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--critical-600)', marginBottom: 8 }}>
                <window.Icon.alert size={17} /><span style={{ font: 'var(--type-eyebrow)', letterSpacing: 'var(--tracking-label)', textTransform: 'uppercase' }}>Undiscussed at the top</span>
              </div>
              <div style={{ font: 'var(--type-title)', color: 'var(--ink-900)', marginBottom: 6 }}>{d.domain.name}</div>
              <p style={{ font: 'var(--type-sm)', color: 'var(--ink-600)', margin: '0 0 12px' }}>Raised by <strong>{d.lo}%</strong> of low-authority and <strong>{d.c1}%</strong> of community interviews — only <strong>{d.c3}%</strong> of leadership.</p>
              <Button size="sm" variant="secondary" iconRight={<window.Icon.quote size={14} />} onClick={() => onNavigate && onNavigate('quotes')}>See evidence</Button>
            </div>
          ))}
        </K.Grid>
      </div>
    </div>
  );
}

// ============================================================
// 5 · AUTHORITY ANALYSIS
// ============================================================
function AuthorityAnalysis() {
  const UI = window.HEARTDesignSystem_d7d056, C = window.Charts, K = window.Kit, G = window.HEART_DATA;
  const { Panel, Badge } = UI;
  const segs = [
    { key: 'hi', label: 'High Authority', color: 'var(--circle-leadership)' },
    { key: 'med', label: 'Medium Authority', color: 'var(--circle-internal)' },
    { key: 'lo', label: 'Low Authority', color: 'var(--circle-community)' },
  ];
  const items = G.authority.focus.map((f) => ({ label: f.topic, parts: { hi: f.hi, med: f.med, lo: f.lo } }));

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
      <K.Grid cols={3}>
        {G.authority.levels.map((l) => (
          <Panel key={l.id} style={{ borderLeft: `3px solid ${l.color}` }}>
            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
              <div style={{ font: 'var(--type-title)', color: 'var(--ink-900)' }}>{l.label}</div>
              <span style={{ fontFamily: 'var(--font-serif)', fontSize: 26, fontWeight: 600, color: l.color }}>{l.n}</span>
            </div>
            <div style={{ font: 'var(--type-sm)', color: 'var(--ink-500)', marginTop: 4 }}>{l.sub}</div>
          </Panel>
        ))}
      </K.Grid>

      <Panel eyebrow="Who talks about what" title="Topic ownership by decision authority"
        action={<div style={{ display: 'flex', gap: 12, font: 'var(--type-sm)' }}>{segs.map((s) => <span key={s.key} style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span style={{ width: 10, height: 10, borderRadius: 3, background: s.color }} />{s.label.split(' ')[0]}</span>)}</div>}>
        <C.StackedBars items={items} segs={segs} />
        <K.AIInsight title="Authority insight" >
          <strong>Solutions and measurement are owned at the top; barriers and trust are owned at the bottom.</strong> High-authority stakeholders account for 44–49% of solution and measurement segments but only 15–18% of barrier and trust segments — the people naming problems are rarely the people empowered to fix them.
        </K.AIInsight>
      </Panel>

      <Panel eyebrow="Domain lens" title="Domain emphasis — low vs high authority"
        action={<Badge tone="neutral">Δ = low − high</Badge>}>
        <C.HBars items={[...G.domainStats].sort((a, b) => b.authorityGap - a.authorityGap).slice(0, 8).map((d) => ({ label: d.domain.code + ' · ' + d.domain.name.split(' ').slice(0, 2).join(' '), value: d.authorityGap, color: d.authorityGap > 0 ? 'var(--circle-community)' : 'var(--circle-leadership)' }))} max={50} />
      </Panel>
    </div>
  );
}

// ============================================================
// 16 · CODING MATRIX EXPLORER
// ============================================================
function CodingMatrixExplorer() {
  const UI = window.HEARTDesignSystem_d7d056, K = window.Kit, G = window.HEART_DATA;
  const { Panel, Badge, CircleBadge, Tag, Button, Input } = UI;
  const [expanded, setExpanded] = React.useState(G.matrixRows[0].interview);
  const [oneHot, setOneHot] = React.useState(false);
  const onehotKeys = ['D1', 'D2', 'D4', 'D5', 'D8', 'D9', 'D11'];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', gap: 12, alignItems: 'flex-end', flexWrap: 'wrap' }}>
        <Input style={{ flex: 1, minWidth: 240 }} label="Search interviews, codes, subcodes" iconLeft={<window.Icon.search size={16} />} placeholder="e.g. BARR, trust, INT-2026" />
        <Button variant={oneHot ? 'primary' : 'secondary'} onClick={() => setOneHot((v) => !v)} iconLeft={<window.Icon.layers size={15} />}>One-hot encoding</Button>
        <Button variant="secondary" onClick={() => window.pushToast && window.pushToast('Exporting coding matrix → CSV', 'positive')} iconLeft={<window.Icon.download size={15} />}>CSV</Button>
        <Button variant="secondary" onClick={() => window.pushToast && window.pushToast('Exporting coding matrix → XLSX', 'positive')} iconLeft={<window.Icon.download size={15} />}>Excel</Button>
      </div>

      {oneHot ? (
        <Panel eyebrow="Machine-readable" title="One-hot encoded matrix" padded={false}>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ borderCollapse: 'collapse', width: '100%', minWidth: 640 }}>
              <thead>
                <tr style={{ borderBottom: '1px solid var(--border-default)' }}>
                  <th style={{ textAlign: 'left', padding: '12px 16px', font: 'var(--type-meta)', color: 'var(--ink-400)', textTransform: 'uppercase', letterSpacing: '0.04em', position: 'sticky', left: 0, background: 'var(--white)' }}>Interview</th>
                  {onehotKeys.map((k) => <th key={k} style={{ padding: '12px 8px', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-500)' }}>{G.domainById(k).code}</th>)}
                </tr>
              </thead>
              <tbody>
                {G.matrixRows.map((r) => (
                  <tr key={r.interview} style={{ borderBottom: '1px solid var(--border-divider)' }}>
                    <td style={{ padding: '10px 16px', fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--ink-700)', position: 'sticky', left: 0, background: 'var(--white)' }}>{r.interview}</td>
                    {onehotKeys.map((k) => {
                      const v = r.onehot[k];
                      return <td key={k} style={{ textAlign: 'center', padding: '10px 8px' }}>
                        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 600, color: v ? 'var(--positive-600)' : 'var(--ink-300)' }}>{v != null ? v : 0}</span>
                      </td>;
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{ padding: '12px 16px', font: 'var(--type-meta)', color: 'var(--ink-400)', borderTop: '1px solid var(--border-divider)' }}>1 = domain coded present in interview · 0 = absent. This structured output feeds the analytics pipeline.</div>
        </Panel>
      ) : (
        <Panel eyebrow="Raw coding output" title="Interview → codes → subcodes → quote" padded={false}>
          {G.matrixRows.map((r) => {
            const open = expanded === r.interview;
            const dom = G.domainById(r.domain);
            const auth = G.authority.levels.find((a) => a.id === r.authority);
            const q = G.quotes.find((x) => x.id === r.quote);

health-equity framework. Read each transcript
segment and assign:

the matrix. Flag ambiguous segments for human
review.`;

    { v: 'v4', note: 'Added confidence + review flag', agree: 91, live: true },
    { v: 'v3', note: 'Constrained to 13-domain matrix', agree: 87 },
    { v: 'v2', note: 'Subcode support', agree: 82 },
    { v: 'v1', note: 'Initial parent-only', agree: 74 },

  const liveV = (versions.find((x) => x.live) || versions[0]).v;
  const nextV = 'v' + (Math.max.apply(null, versions.map((x) => parseInt(x.v.slice(1), 10))) + 1);
  function startEdit() { setDraft(promptText); setEditing(true); }
  function deployPrompt() {
    const text = editing ? (draft.trim() || promptText) : promptText;
    setPromptText(text);
    setVersions((vs) => [{ v: nextV, note: editing ? 'Edited coding instructions' : 'Re-deployed current prompt', agree: 91, live: true }, ...vs.map((x) => ({ ...x, live: false }))]);

      {tab === 'review' && (

                      {dec ? <Badge tone={dec === 'approve' ? 'positive' : 'critical'}>{dec === 'approve' ? 'Approved' : 'Rejected'}</Badge> : (
                        <React.Fragment>
                          <Button size="sm" variant="secondary" onClick={() => decide(c.id, 'reject')}>Reject</Button>

      {tab === 'agreement' && (

        </Panel>
      )}

      {tab === 'prompts' && (

            ) : (

                  <Button variant="primary" onClick={deployPrompt}>Re-deploy {liveV}</Button>
                </React.Fragment>
              )}
            </div>
          </Panel>
          <Panel eyebrow="History" title="Prompt versions">
            {versions.map((p) => (
              <div key={p.v} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '11px 0', borderBottom: '1px solid var(--border-divider)' }}>

  const SCREENS = {
    overview: 'ExecutiveOverview', readiness: 'ReadinessScore', voice: 'VoiceAuthority',
    theme: 'ThemeHub', circle: 'EngagementHub', gap: 'GapsBarriers',
    quotes: 'QuoteExplorer', matrix: 'CodingMatrixExplorer', patterns: 'PatternsHub', coding: 'CodingQuality',
    recommend: 'ProgramsBlueprint', operations: 'Operations',
  };
  // legacy route id -> { route: hub, tab } so ⌘K, Executive Mode and in-page
  // links keep working and deep-link to the correct tab.
  const ALIAS = {
    emerging:    { route: 'theme', tab: 'emerging' },
    blindspot:   { route: 'voice', tab: 'blindspot' },
    authority:   { route: 'voice', tab: 'authority' },
    proximity:   { route: 'voice', tab: 'proximity' },
    stakeholder: { route: 'circle', tab: 'stakeholders' },
    trust:       { route: 'circle', tab: 'trust' },
    barrier:     { route: 'gap', tab: 'barriers' },
    network:     { route: 'patterns', tab: 'network' },
    trend:       { route: 'patterns', tab: 'timeline' },
    geo:         { route: 'patterns', tab: 'geography' },
    program:     { route: 'recommend', tab: 'program' },
    admin:       { route: 'operations', tab: 'agent' },
    workflow:    { route: 'operations', tab: 'workflow' },
    reports:     { route: 'operations', tab: 'reports' },
    aws:         { route: 'operations', tab: 'aws' },
  };
  // The global circle / domain / time lens only drives these analytics pages.
  // Evidence + Pipeline pages have their own in-page controls, so the bar is
  // hidden there rather than sitting dead.
  const FILTERABLE = new Set(['overview', 'readiness', 'voice', 'theme', 'circle', 'gap']);

  function Placeholder({ name, onNavigate }) {
    const { Panel, Badge, Button } = window.HEARTDesignSystem_d7d056;
    return (
      <Panel>
        <div style={{ textAlign: 'center', padding: '56px 20px', color: 'var(--ink-400)' }}>
          <div style={{ marginBottom: 12 }}><Badge tone="neutral">Specified · scaffolding in this build</Badge></div>
          <h2 style={{ font: 'var(--type-h3)', color: 'var(--ink-700)', margin: '0 0 8px' }}>{name}</h2>
          <p style={{ font: 'var(--type-body)', maxWidth: 460, margin: '0 auto 18px' }}>This surface is part of the platform IA. The 14 analytics dashboards, Quote Explorer, and Executive Mode are fully interactive — explore those from the sidebar or ⌘K.</p>
          <Button variant="secondary" onClick={() => onNavigate('overview')}>Back to overview</Button>
        </div>
      </Panel>
    );
  }

  function App() {
    const [route, setRoute] = React.useState('quotes');
    const [routeTab, setRouteTab] = React.useState(null);
    const [filters, setFilters] = React.useState({ circle: 'all', domain: 'all', time: 'q2' });
    const [compare, setCompare] = React.useState(false);
    const [copilot, setCopilot] = React.useState(false);
    const [palette, setPalette] = React.useState(false);
    const [exec, setExec] = React.useState(false);
    const [theme, setTheme] = React.useState('light');
    const [savedViews, setSavedViews] = React.useState([{ id: 1, name: 'Community blind spots' }]);

    React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

    React.useEffect(() => {
      const h = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setPalette((p) => !p); }
        else if (e.key === 'Escape') { setPalette(false); setCopilot(false); }
      };
      window.addEventListener('keydown', h);
      return () => window.removeEventListener('keydown', h);
    }, []);

    const navigate = (r) => {
      const a = ALIAS[r];
      const dest = a ? a.route : r;
      if (SCREENS[dest]) { setExec(false); setRoute(dest); setRouteTab(a ? a.tab : null); }
    };
    const onAction = (a) => {
      if (a === 'copilot') setCopilot(true);
      else if (a === 'exec') setExec(true);
      else if (a === 'save') { setSavedViews((v) => [...v, { id: Date.now(), name: 'View ' + (v.length + 1) }]); window.pushToast('View saved', 'positive'); }
      else if (a === 'report') window.pushToast('Executive report generating…', 'neutral');
      else if (a === 'snapshot') window.pushToast('Snapshot captured', 'positive');
    };

    const [eyebrow, title] = TITLES[route] || ['', route];
    const Screen = window[SCREENS[route]];

    const filterBar = (
      <window.FilterBar
        filters={filters} setFilters={setFilters} compare={compare} setCompare={setCompare}
        savedViews={savedViews}
        onSaveView={() => onAction('save')}
        onLoadView={(v) => { setFilters({ circle: 1, domain: 'D5', time: 'q2' }); window.pushToast('Loaded · ' + v.name, 'neutral'); }}
        onSnapshot={() => onAction('snapshot')}
      />
    );

    return (
      <React.Fragment>
        {exec ? (
          <window.ExecutiveMode onNavigate={navigate} onExit={() => setExec(false)} />
        ) : (
          <window.AppShell
            active={route} onNavigate={navigate} title={title} eyebrow={eyebrow}
            onOpenPalette={() => setPalette(true)} onOpenCopilot={() => setCopilot(true)} onExec={() => setExec(true)}
            theme={theme} onToggleTheme={() => setTheme((t) => (t === 'dark' ? 'light' : 'dark'))}
            filterBar={FILTERABLE.has(route) ? filterBar : null}
          >
            {Screen ? <Screen onNavigate={navigate} filters={filters} compare={compare} initialTab={routeTab} /> : <Placeholder name={title} onNavigate={navigate} />}
          </window.AppShell>
        )}
        <window.Copilot open={copilot} onClose={() => setCopilot(false)} screen={route} />
        <window.CommandPalette open={palette} onClose={() => setPalette(false)} onNavigate={navigate} onAction={onAction} />
        <window.Toasts />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
