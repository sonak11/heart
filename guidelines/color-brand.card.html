<!-- @dsCard group="Colors" viewport="700x150" name="Brand · Rutgers Scarlet" subtitle="Primary brand mark and its tint/shade ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--paper); font-family:var(--font-sans); color:var(--text-body); padding:20px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-sm); border:1px solid rgba(0,0,0,.06); overflow:hidden; }
  .chip { height:64px; }
  .meta { padding:7px 9px; background:var(--white); }
  .name { font:var(--w-semibold) 12px/1.2 var(--font-sans); color:var(--text-display); }
  .hex { font:var(--w-regular) 11px/1.4 var(--font-mono); color:var(--text-muted); text-transform:uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--scarlet-700)"></div><div class="meta"><div class="name">700</div><div class="hex">#8E0021</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--scarlet-600)"></div><div class="meta"><div class="name">600 · hover</div><div class="hex">#B3002D</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--scarlet-500)"></div><div class="meta"><div class="name">500 · brand</div><div class="hex">#CC0033</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--scarlet-400)"></div><div class="meta"><div class="name">400</div><div class="hex">#E03A5F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--scarlet-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#FBE3E8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--scarlet-050)"></div><div class="meta"><div class="name">050</div><div class="hex">#FDF1F3</div></div></div>
  </div>
</body>
</html>
