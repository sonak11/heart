<!-- @dsCard group="Type" viewport="700x200" name="Display Serif · Newsreader" subtitle="Editorial headlines and big KPI numbers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--paper); font-family:var(--font-sans); color:var(--text-body); padding:22px 24px; }
  .eyebrow { font:var(--w-medium) 11px/1 var(--font-mono); letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; }
  .display { font:var(--type-display); color:var(--text-display); letter-spacing:var(--tracking-tight); margin:0 0 14px; }
  .row { display:flex; align-items:baseline; gap:18px; }
  .kpi { font:var(--type-kpi); color:var(--scarlet-600); }
  .h1 { font:var(--type-h1); color:var(--text-display); margin:0; }
</style>
</head>
<body>
  <div class="eyebrow">Newsreader · 400 / 500 / 600</div>
  <p class="display">Readiness is a decision, not a feeling.</p>
  <div class="row">
    <span class="kpi">73%</span>
    <h1 class="h1">Health equity, in focus</h1>
  </div>
</body>
</html>
